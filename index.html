<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Zengine — We Are The Change</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Zengine — digital growth consultancy + creative tech studio. Florida & Texas. Website development, growth systems, and creative tools for small businesses and indie creators." />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'nonce-zengine-1'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'; upgrade-insecure-requests">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="Referrer-Policy" content="no-referrer-when-downgrade">
  <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), usb=()">
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><defs><linearGradient id='g' x1='0' x2='1'><stop stop-color='%2387ceeb'/><stop offset='1' stop-color='%23ff7f6e'/></linearGradient></defs><rect rx='12' width='64' height='64' fill='%23071828'/><path d='M12 44V20h12v16h18v8H12z' fill='url(%23g)'/><circle cx='46' cy='24' r='7' fill='url(%23g)'/></svg>" />
  <style>
    :root {
      --bg: #071828;
      --bg-2: #0b1e30;
      --bg-card: rgba(255,255,255,.055);
      --txt: #f0f6ff;
      --muted: #8bafc8;
      --sky: #87ceeb;
      --coral: #ff7f6e;
      --peach: #ffb38a;
      --orange: #ff8c42;
      --mint: #6de8c8;
      --glass: rgba(255,255,255,.055);
      --glass-border: rgba(255,255,255,.10);
      --radius: 18px;
      --radius-sm: 12px;
      --shadow: 0 8px 32px rgba(0,0,0,.45), 0 2px 8px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.06);
      --shadow-lift: 0 20px 60px rgba(0,0,0,.55), 0 4px 16px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.08);
      --glow-sky: 0 0 24px rgba(135,206,235,.22);
      --glow-coral: 0 0 24px rgba(255,127,110,.22);
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; scroll-behavior: smooth; }
    body {
      margin: 0;
      color: var(--txt);
      line-height: 1.65;
      font-family: 'Georgia', 'Times New Roman', ui-serif, serif;
      background:
        radial-gradient(ellipse 1200px 600px at 0% 0%, rgba(135,206,235,.10) 0%, transparent 60%),
        radial-gradient(ellipse 900px 700px at 100% 85%, rgba(255,127,110,.09) 0%, transparent 60%),
        radial-gradient(ellipse 700px 500px at 50% 50%, rgba(109,232,200,.04) 0%, transparent 60%),
        linear-gradient(165deg, var(--bg) 0%, #091e34 50%, var(--bg-2) 100%);
      background-attachment: fixed;
    }
    a { color: var(--sky); text-decoration: none; }
    a:focus-visible, button:focus-visible { outline: 2px solid var(--coral); outline-offset: 3px; }
    img { max-width: 100%; display: block; }
    h1, h2, h3, h4 { line-height: 1.25; margin-top: 0; }
    p { margin-top: 0; }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: rgba(135,206,235,.25); border-radius: 3px; }

    /* ── NAV ── */
    header { position: sticky; top: 0; z-index: 50; border-bottom: 1px solid rgba(255,255,255,.07); }
    .nav {
      background: url("data:image/svg+xml;utf8,<?xml version='1.0' encoding='UTF-8'?><svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1600 80' preserveAspectRatio='none'><defs><linearGradient id='bg' x1='0' y1='0' x2='0' y2='1'><stop offset='0%' stop-color='%23071828'/><stop offset='100%' stop-color='%230a1c2e'/></linearGradient><linearGradient id='rail' x1='0%' y1='0' x2='100%' y2='0'><stop offset='0%' stop-color='%2387ceeb'/><stop offset='30%' stop-color='%23ff7f6e'/><stop offset='60%' stop-color='%23ffb38a'/><stop offset='80%' stop-color='%23ff8c42'/><stop offset='100%' stop-color='%2387ceeb'/></linearGradient><linearGradient id='sh' x1='0' y1='0' x2='1' y2='1'><stop offset='0%' stop-color='%2387ceeb' stop-opacity='.15'/><stop offset='100%' stop-color='%23ff7f6e' stop-opacity='.08'/></linearGradient></defs><rect width='1600' height='80' fill='url(%23bg)'/><g opacity='.3'><polygon fill='url(%23sh)' points='60,18 130,10 162,34 94,42'/><polygon fill='url(%23sh)' points='260,22 330,8 372,26 300,40'/><polygon fill='url(%23sh)' points='520,18 585,6 628,26 560,38'/><polygon fill='url(%23sh)' points='900,16 980,8 1020,30 940,38'/><polygon fill='url(%23sh)' points='1180,18 1250,6 1292,26 1224,40'/></g><rect x='0' y='77' width='1600' height='3' fill='url(%23rail)' opacity='.95'/></svg>") center/cover no-repeat;
      backdrop-filter: saturate(130%) blur(12px);
    }
    .nav-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; gap: 1rem; padding: .7rem 1rem; }
    .brand { display: flex; align-items: center; gap: .6rem; text-decoration: none; }
    .brand img { width: 38px; height: 38px; border-radius: 10px; object-fit: cover; filter: drop-shadow(0 0 10px rgba(135,206,235,.45)); transition: filter .3s; }
    .brand img:hover { filter: drop-shadow(0 0 16px rgba(255,127,110,.6)); }
    .brand b { letter-spacing: .5px; font-size: 1.05rem; color: var(--txt); font-family: ui-sans-serif, system-ui, sans-serif; }
    .menu { margin-left: auto; display: flex; gap: .25rem; flex-wrap: wrap; }
    .menu a { padding: .45rem .7rem; border-radius: 10px; color: var(--muted); font-family: ui-sans-serif, system-ui, sans-serif; font-size: .88rem; transition: color .2s, background .2s; }
    .menu a[aria-current="page"], .menu a:hover { color: var(--txt); background: var(--glass); box-shadow: 0 2px 12px rgba(0,0,0,.3); }

    /* ── MAIN ── */
    main { max-width: 1200px; margin: 0 auto; padding: 1rem; }

    /* ── HERO ── */
    .hero {
      position: relative; min-height: 60vh; border-radius: var(--radius); overflow: hidden;
      display: grid; place-items: center; text-align: center;
      background: linear-gradient(135deg, #071828 0%, #0e243d 50%, #0d1f30 100%) center/cover no-repeat;
      box-shadow: var(--shadow-lift);
      border: 1px solid var(--glass-border);
    }
    .hero::before { content: ""; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(7,24,40,.2) 0%, rgba(7,24,40,.6) 100%); }
    /* Decorative grid lines */
    .hero::after {
      content: "";
      position: absolute; inset: 0;
      background-image: linear-gradient(rgba(135,206,235,.04) 1px, transparent 1px), linear-gradient(90deg, rgba(135,206,235,.04) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black, transparent);
    }
    .hero .content { position: relative; z-index: 1; padding: 2.5rem 1.5rem; }
    .hero .eyebrow {
      display: inline-block; font-family: ui-sans-serif, system-ui, sans-serif; font-size: .75rem;
      letter-spacing: .18em; text-transform: uppercase; color: var(--sky); margin-bottom: 1rem;
      background: rgba(135,206,235,.1); border: 1px solid rgba(135,206,235,.25);
      padding: .3rem .9rem; border-radius: 999px;
    }
    .hero h1 { font-size: clamp(1.9rem, 3vw + 1rem, 3.4rem); margin: .4rem 0 1.1rem; font-style: italic; }
    .hero h1 em { font-style: normal; background: linear-gradient(90deg, var(--sky), var(--coral)); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .hero p { color: var(--muted); max-width: 680px; margin: 0 auto 1.5rem; font-size: 1.05rem; }
    .hero-btns { display: flex; gap: .75rem; justify-content: center; flex-wrap: wrap; }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex; align-items: center; gap: .4rem;
      border: 1px solid var(--glass-border); padding: .75rem 1.2rem;
      border-radius: var(--radius-sm); color: var(--txt);
      font-family: ui-sans-serif, system-ui, sans-serif; font-size: .9rem;
      transition: transform .12s ease, background .2s, box-shadow .2s;
      cursor: pointer; background: var(--glass); white-space: nowrap;
    }
    .btn:hover { transform: translateY(-2px); background: rgba(255,255,255,.1); box-shadow: var(--shadow-lift); }
    .btn.primary { background: linear-gradient(100deg, var(--coral), var(--orange)); color: #fff; border-color: transparent; font-weight: 700; box-shadow: 0 4px 20px rgba(255,127,110,.3); }
    .btn.primary:hover { box-shadow: 0 8px 30px rgba(255,127,110,.45); }
    .btn.sky { background: linear-gradient(100deg, var(--sky), var(--mint)); color: #071828; border-color: transparent; font-weight: 700; box-shadow: 0 4px 20px rgba(135,206,235,.25); }
    .btn.sky:hover { box-shadow: 0 8px 30px rgba(135,206,235,.4); }

    /* ── SECTIONS ── */
    .section { margin: 2.5rem 0; }
    .section-header { display: flex; align-items: baseline; gap: 1rem; margin-bottom: 1.25rem; }
    .section-header h2 { margin: 0; font-size: clamp(1.3rem, 2vw, 1.7rem); }
    .section-header .divider { flex: 1; height: 1px; background: linear-gradient(90deg, rgba(135,206,235,.3), transparent); }

    /* ── CARD ── */
    .card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 1.25rem;
      box-shadow: var(--shadow);
      transition: box-shadow .25s, transform .15s, border-color .25s;
    }
    .card:hover { box-shadow: var(--shadow-lift); border-color: rgba(135,206,235,.2); }
    .card.coral:hover { border-color: rgba(255,127,110,.25); box-shadow: var(--shadow-lift), 0 0 40px rgba(255,127,110,.08); }

    /* ── TILES ── */
    .tiles { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
    .tile { background: var(--glass); border: 1px solid var(--glass-border); border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: transform .18s ease, box-shadow .2s, border-color .2s; }
    .tile:hover { transform: translateY(-4px); box-shadow: var(--shadow-lift); border-color: rgba(135,206,235,.22); }
    .tile .thumb { height: 148px; background: #0d1e30 center/cover no-repeat; position: relative; }
    .tile .thumb::after { content: ""; position: absolute; inset: 0; background: linear-gradient(to top, rgba(7,24,40,.7), transparent 60%); }
    .tile .body { padding: .9rem; }
    .tile h3 { margin: .2rem 0 .3rem; font-size: .95rem; font-family: ui-sans-serif, system-ui, sans-serif; }
    .tile p { margin: 0; color: var(--muted); font-size: .85rem; line-height: 1.5; }
    @media (max-width: 900px) { .tiles { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 500px) { .tiles { grid-template-columns: 1fr 1fr; gap: .75rem; } .tile .thumb { height: 110px; } }

    /* ── TEASER STRIP ── */
    .teaser { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; align-items: center; }
    .teaser .poster { border-radius: var(--radius); overflow: hidden; border: 1px solid var(--glass-border); box-shadow: var(--shadow-lift); }
    .soon {
      font-family: 'Trebuchet MS', Impact, 'Arial Narrow Bold', sans-serif;
      letter-spacing: .08em; font-size: clamp(2.2rem, 5vw, 4rem);
      text-align: center;
      background: linear-gradient(90deg, var(--coral), var(--peach), var(--orange));
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .soon .o { position: relative; display: inline-block; }
    .soon .o::before, .soon .o::after { content: "♦"; position: absolute; inset: auto; top: 55%; transform: translateY(-50%); font-size: .36em; color: var(--coral); }
    .soon .o::before { left: -.25em; } .soon .o::after { right: -.25em; }
    @media (max-width: 860px) { .teaser { grid-template-columns: 1fr; } }

    /* ── GRID-2 ── */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }
    @media (max-width: 860px) { .grid-2 { grid-template-columns: 1fr; } .grid-3 { grid-template-columns: 1fr; } }
    @media (max-width: 600px) { .grid-3 { grid-template-columns: 1fr 1fr; } }

    /* ── PIPELINE ── */
    .pipeline { display: grid; grid-template-columns: repeat(4, 1fr); gap: .75rem; }
    @media (max-width: 860px) { .pipeline { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 480px) { .pipeline { grid-template-columns: 1fr; } }
    .pipe-step {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 1.1rem;
      position: relative;
      box-shadow: var(--shadow);
      transition: transform .15s, box-shadow .2s;
    }
    .pipe-step:hover { transform: translateY(-3px); box-shadow: var(--shadow-lift); }
    .pipe-num {
      display: inline-block; width: 32px; height: 32px; border-radius: 50%;
      font-family: ui-sans-serif, system-ui, sans-serif; font-weight: 800; font-size: .85rem;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: .65rem;
    }
    .pipe-num.n1 { background: rgba(135,206,235,.15); color: var(--sky); border: 1px solid rgba(135,206,235,.3); }
    .pipe-num.n2 { background: rgba(109,232,200,.15); color: var(--mint); border: 1px solid rgba(109,232,200,.3); }
    .pipe-num.n3 { background: rgba(255,179,138,.15); color: var(--peach); border: 1px solid rgba(255,179,138,.3); }
    .pipe-num.n4 { background: rgba(255,127,110,.15); color: var(--coral); border: 1px solid rgba(255,127,110,.3); }
    .pipe-step h4 { margin: 0 0 .4rem; font-family: ui-sans-serif, system-ui, sans-serif; font-size: .95rem; }
    .pipe-step ul { margin: 0; padding-left: 1.1rem; color: var(--muted); font-size: .82rem; line-height: 1.6; }

    /* ── SERVICES MATRIX ── */
    .matrix { display: grid; grid-template-columns: repeat(3, 1fr); gap: .75rem; }
    @media (max-width: 860px) { .matrix { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 500px) { .matrix { grid-template-columns: 1fr; } }
    .matrix-cell {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      padding: 1rem;
      box-shadow: 0 4px 16px rgba(0,0,0,.25);
      transition: transform .15s, box-shadow .2s, border-color .2s;
    }
    .matrix-cell:hover { transform: translateY(-2px); box-shadow: var(--shadow-lift); }
    .matrix-cell .icon { font-size: 1.4rem; margin-bottom: .5rem; }
    .matrix-cell h4 { margin: 0 0 .3rem; font-size: .9rem; font-family: ui-sans-serif, system-ui, sans-serif; color: var(--sky); }
    .matrix-cell p { margin: 0; font-size: .82rem; color: var(--muted); line-height: 1.5; }

    /* ── NEW SERVICES CATEGORIES ── */
    .service-cat { margin-bottom: 1.75rem; }
    .service-cat-label {
      display: inline-flex; align-items: center; gap: .5rem;
      font-family: ui-sans-serif, system-ui, sans-serif; font-size: .78rem;
      letter-spacing: .12em; text-transform: uppercase; margin-bottom: .85rem;
      padding: .3rem .9rem; border-radius: 999px;
    }
    .service-cat-label.compliance { background: rgba(135,206,235,.1); color: var(--sky); border: 1px solid rgba(135,206,235,.25); }
    .service-cat-label.creative { background: rgba(255,127,110,.1); color: var(--coral); border: 1px solid rgba(255,127,110,.25); }
    .service-cat-label.management { background: rgba(109,232,200,.1); color: var(--mint); border: 1px solid rgba(109,232,200,.25); }
    .service-items { display: grid; grid-template-columns: 1fr 1fr; gap: .6rem; }
    @media (max-width: 500px) { .service-items { grid-template-columns: 1fr; } }
    .service-item {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      padding: .8rem 1rem;
      font-size: .85rem;
      transition: border-color .2s, background .2s;
    }
    .service-item strong { display: block; margin-bottom: .15rem; font-family: ui-sans-serif, system-ui, sans-serif; font-size: .88rem; }
    .service-item:hover { background: rgba(255,255,255,.08); border-color: rgba(135,206,235,.25); }

    /* ── ABOUT CALLOUT STAT ── */
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: .75rem; margin: 1rem 0; }
    @media (max-width: 600px) { .stats-row { grid-template-columns: 1fr 1fr; } }
    .stat-box {
      background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm); padding: 1rem;
      text-align: center; box-shadow: var(--shadow);
    }
    .stat-box .num { font-size: 1.6rem; font-weight: 800; font-family: ui-sans-serif, system-ui, sans-serif; background: linear-gradient(90deg, var(--sky), var(--mint)); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .stat-box .label { font-size: .78rem; color: var(--muted); font-family: ui-sans-serif, system-ui, sans-serif; margin-top: .15rem; }

    /* ── POSITIONING BLOCK ── */
    .position-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: .6rem; }
    @media (max-width: 700px) { .position-grid { grid-template-columns: 1fr 1fr; } }
    .pos-pill {
      background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm); padding: .9rem .75rem;
      text-align: center; font-family: ui-sans-serif, system-ui, sans-serif;
      font-size: .82rem; transition: transform .15s, background .2s;
    }
    .pos-pill:hover { transform: translateY(-2px); background: rgba(135,206,235,.08); }
    .pos-pill .pill-icon { font-size: 1.3rem; display: block; margin-bottom: .35rem; }

    /* ── TIMELINE ── */
    .timeline { list-style: none; padding: 0; margin: 1rem 0 0; border-left: 2px dashed rgba(135,206,235,.2); }
    .timeline li { position: relative; margin-left: 1.3rem; padding: .4rem 0 1rem; }
    .timeline li::before { content: ""; position: absolute; left: -10px; top: .55rem; width: 10px; height: 10px; border-radius: 50%; background: linear-gradient(90deg, var(--sky), var(--coral)); box-shadow: 0 0 0 4px rgba(135,206,235,.12); }

    /* ── TAGS ── */
    .tags { display: flex; gap: .4rem; flex-wrap: wrap; justify-content: center; margin: 1rem 0; }
    .tag { font-size: .78rem; background: rgba(135,206,235,.10); border: 1px solid rgba(135,206,235,.22); color: #b8e8ff; padding: .2rem .65rem; border-radius: 999px; font-family: ui-sans-serif, system-ui, sans-serif; }

    /* ── CHIP ── */
    .chip { display: inline-block; background: var(--glass); border: 1px solid var(--glass-border); padding: .35rem .7rem; border-radius: 999px; color: var(--txt); font-family: ui-sans-serif, system-ui, sans-serif; font-size: .85rem; transition: background .2s; }
    .chip:hover { background: rgba(255,255,255,.1); }

    /* ── MANIFESTO BLOCK ── */
    .manifesto-pull {
      font-size: clamp(1.3rem, 2.5vw, 1.75rem);
      line-height: 1.45;
      font-style: italic;
      color: var(--txt);
      border-left: 3px solid var(--coral);
      padding-left: 1.25rem;
      margin: 1.5rem 0;
    }

    /* ── PROJ PAGES ── */
    .page { margin: 2rem 0; }
    .proj-hero { position: relative; border-radius: var(--radius); overflow: hidden; min-height: 40vh; background: #0d1e30 center/cover no-repeat; display: grid; place-items: center; text-align: center; box-shadow: var(--shadow-lift); border: 1px solid var(--glass-border); }
    .proj-hero::before { content: ""; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,.3), rgba(7,24,40,.85)); }
    .proj-hero .inner { position: relative; padding: 2rem 1.5rem; }

    /* ── COUNTDOWN ── */
    .countbox { display: flex; gap: .6rem; justify-content: center; margin: 1rem 0; flex-wrap: wrap; }
    .countbox .c { min-width: 80px; text-align: center; background: var(--glass); border: 1px solid var(--glass-border); border-radius: var(--radius-sm); padding: .6rem; box-shadow: var(--shadow); }
    .countbox .n { font-size: 1.6rem; font-weight: 800; font-family: ui-sans-serif, system-ui, sans-serif; color: var(--sky); }
    .countbox .lbl { font-size: .7rem; color: var(--muted); font-family: ui-sans-serif, system-ui, sans-serif; letter-spacing: .08em; text-transform: uppercase; margin-top: .15rem; }

    /* ── EASTER EGG ── */
    .egg { position: fixed; inset: 0; pointer-events: none; opacity: 0; transition: opacity .5s ease; background: rgba(0,0,0,.65) center/cover no-repeat; z-index: 100; }
    .egg.show { opacity: .35; }

    /* ── ICP BLOCK ── */
    .icp-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: .5rem; }
    .icp-list li { display: flex; align-items: flex-start; gap: .75rem; font-size: .9rem; }
    .icp-list li::before { content: "→"; color: var(--coral); font-weight: 700; flex-shrink: 0; margin-top: .05rem; }

    /* ── CTA SECTION ── */
    .cta-block {
      background: linear-gradient(135deg, rgba(135,206,235,.08) 0%, rgba(255,127,110,.08) 100%);
      border: 1px solid rgba(135,206,235,.18);
      border-radius: var(--radius); padding: 2rem 1.5rem;
      text-align: center; box-shadow: var(--shadow-lift);
    }
    .cta-block h2 { font-size: clamp(1.3rem, 2.5vw, 2rem); margin-bottom: .75rem; }
    .cta-block p { color: var(--muted); max-width: 560px; margin: 0 auto 1.5rem; }

    /* ── FOOTER ── */
    footer { max-width: 1200px; margin: 2.5rem auto 1.5rem; padding: 1.5rem 1rem 1rem; border-top: 1px solid rgba(255,255,255,.07); }
    .footer-inner { display: flex; justify-content: space-between; align-items: center; gap: 1rem; flex-wrap: wrap; }
    .footer-links { display: flex; gap: .5rem; flex-wrap: wrap; }

        <p>We act as a calibrated third-party lens — bringing structure, realism, and controlled scalability to creative projects without compromising their artistic core. We don't overpower vision. We refine and amplify it.</p>

        <h3>The operating principle</h3>
        <div class="manifesto-pull" style="border-color:var(--sky); font-size:1.1rem;">"Will this increase meaningful engagement while preserving the integrity of the experience?"</div>
        <p style="color:var(--muted)">If yes: we build it. If no: we don't pursue it. That's not a constraint. That's a competitive advantage.</p>

        <h3>Where we're going</h3>
        <p>Zengine will evolve beyond consultancy into hardware and technology development — building tools that support immersive, realistic, and scalable digital experiences. Progress with purpose. Imagination with impact.</p>
        <p><strong>The world is already different — and we're just getting started.</strong></p>
      </div>
    </section>
  </template>

  <!-- CREDITS -->
  <template id="tpl-credits">
    <section class="page card" style="text-align:center; max-width:600px; margin:0 auto;">
      <h2>Credits</h2>
      <p>Zengine — built by two gamers who started from the floor to opening doors. Proving anyone can do it.</p>
      <p style="color:var(--muted)">"Blah blah yada yada yada, roll credits."</p>
      <p style="color:var(--muted); font-size:.9rem">Florida & Texas · Serving clients globally</p>
      <div style="margin-top:1rem; display:flex; gap:.5rem; justify-content:center; flex-wrap:wrap;">
        <a class="chip" href="https://zengine.site" rel="noopener">zengine.site</a>
        <a class="chip" href="https://zengine.shop" rel="noopener">zengine.shop</a>
        <a class="chip" href="mailto:team@zengine.site">team@zengine.site</a>
      </div>
      <p style="margin-top:1.5rem; color:var(--muted); font-size:.85rem">© <span id="year2"></span> Zengine. All rights reserved.</p>
    </section>
  </template>

  <script nonce="zengine-1">
  // ---------- Data ----------
  const DATA = {
    projects: {
      steedtrek: {
        id: 'steedtrek',
        title: 'Steed Trek — A Knight\'s Tail',
        logo: 'img-steed-logo.jpg',
        hero: 'img-steed-logo.jpg',
        desc: 'Whimsical sci-fi adventure. Neon-western meets chess-punk.',
        tags: ['Game', 'Adventure', 'Narrative', 'Indie'],
        links: [{ label: 'Teaser', href: '#/steed-trek-teaser' }, { label: 'Cutscene Page', href: '#/steed-trek-footage' }],
        body: `<p><strong>Steed Trek</strong> follows a knightly zebra across bizarre star rails and puzzle-dungeons. Expect exploration, conversation, and stylish set-pieces. Built with love and too much coffee.</p>`
      },
      chrono: {
        id: 'chrono',
        title: 'Chrono-Examiner (RTN)',
        logo: 'img-moonman.png',
        hero: 'img-moonman.png',
        desc: 'Chronologizer & backtester for retail traders — journal, analyze, iterate.',
        tags: ['App', 'Backtester', 'Finance'],
        links: [{ label: 'Learn More', href: '#/project/chrono' }],
        body: `<p>Prototype tool for building repeatable trade hypotheses, then stress-testing them on multi-window timelines. Clean visuals; exportable insights. RTN branding will evolve.</p>`
      },
      telegaming: {
        id: 'telegaming',
        title: 'TeleGaming',
        logo: 'img-telegaming.jpg',
        hero: 'img-telegaming.jpg',
        desc: 'Live rooms. Games. Crowd energy. Arcade-meets-broadcast.',
        tags: ['Platform', 'Live', 'Social'],
        links: [{ label: 'Learn More', href: '#/project/telegaming' }],
        body: `<p>Spatial lobbies + spectatorship. Think party-style tournaments, hosts, and audience-driven twists. Built for creators and communities.</p>`
      },
      plumhud: {
        id: 'plumhud',
        title: 'PlumHUD',
        logo: 'img-plumhud.png',
        hero: 'img-plumhud.png',
        desc: 'A sweet, streamlined real-time dashboard — useful, smooth, approachable.',
        tags: ['App', 'Dashboard', 'Utility'],
        links: [{ label: 'Learn More', href: '#/project/plumhud' }],
        body: `<p>Mobile-first HUD for monitoring metrics, devices or services. Pragmatic UX, zero clutter, ships fast.</p>`
      }
    }
  };

  // ---------- Router ----------
  const $ = (s, r = document) => r.querySelector(s);
  const app = $('#app');

  const routes = {
    '/home': renderHome,
    '/about': renderAbout,
    '/services': renderServices,
    '/projects': renderProjects,
    '/project': renderProject,
    '/steed-trek-teaser': renderTeaser,
    '/steed-trek-footage': renderFootage,
    '/manifesto': renderManifesto,
    '/credits': renderCredits
  };

  function navigate() {
    const hash = location.hash || '#/home';
    const path = hash.slice(1);
    const [raw] = path.split('?');
    if (raw.startsWith('/project/')) {
      const id = raw.split('/')[2];
      routes['/project']({ id });
      setActive(null);
      return;
    }
    (routes[raw] || routes['/home'])();
    setActive(raw);
    window.scrollTo(0, 0);
  }

  function setActive(raw) {
    document.querySelectorAll('.menu a[data-link]').forEach(a => {
      a.setAttribute('aria-current', a.getAttribute('href') === `#${raw}` ? 'page' : 'false');
    });
    requestAnimationFrame(() => app.focus());
  }

  window.addEventListener('hashchange', navigate);
  window.addEventListener('DOMContentLoaded', () => {
    $('#year').textContent = new Date().getFullYear();
    navigate();
  });

  // ---------- Views ----------
  function renderHome() {
    app.innerHTML = $('#tpl-home').innerHTML;
    app.querySelectorAll('.tile[data-nav]').forEach(t => {
      t.addEventListener('click', () => location.hash = t.getAttribute('data-nav'));
    });
  }

  function renderAbout() { app.innerHTML = $('#tpl-about').innerHTML; }
  function renderManifesto() { app.innerHTML = $('#tpl-manifesto').innerHTML; }

  function renderCredits() {
    app.innerHTML = $('#tpl-credits').innerHTML;
    $('#year2').textContent = new Date().getFullYear();
  }

  function renderServices() { app.innerHTML = $('#tpl-services').innerHTML; }

  function renderProjects() {
    app.innerHTML = $('#tpl-projects').innerHTML;
    const tiles = $('#proj-tiles');
    const list = Object.values(DATA.projects);
    tiles.innerHTML = list.map(p => `
      <article class="tile" data-nav="#/project/${encodeURIComponent(p.id)}">
        <div class="thumb" style="background-image:url('${escapeAttr(p.logo)}')"></div>
        <div class="body"><h3>${escapeHtml(p.title)}</h3><p>${escapeHtml(p.desc)}</p></div>
      </article>
    `).join('');
    tiles.querySelectorAll('.tile').forEach(t => t.addEventListener('click', () => location.hash = t.getAttribute('data-nav')));
  }

  function renderProject({ id }) {
    const p = DATA.projects[id];
    if (!p) { app.innerHTML = `<section class="page card"><p>Project not found.</p></section>`; return; }
    app.innerHTML = $('#tpl-project').innerHTML;
    $('#projHero').style.backgroundImage = `url('${escapeAttr(p.hero)}')`;
    $('#projLogo').src = p.logo; $('#projLogo').alt = p.title + ' logo';
    $('#projTitle').textContent = p.title;
    $('#projDesc').textContent = p.desc;
    $('#projTags').innerHTML = (p.tags || []).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('');
    $('#projLinks').innerHTML = (p.links || []).map(l => `<a class="btn" href="${escapeAttr(l.href)}">${escapeHtml(l.label)} →</a>`).join(' ');
    $('#projBody').innerHTML = p.body || '';
  }

  function renderTeaser() { app.innerHTML = $('#tpl-teaser').innerHTML; }

  function renderFootage() {
    app.innerHTML = $('#tpl-footage').innerHTML;
    const target = new Date('2026-06-01T00:00:00');
    $('#targetDate').textContent = target.toString();
    const el = $('#countdown');
    const tick = () => {
      const now = new Date();
      let diff = Math.max(0, target - now);
      const d = Math.floor(diff / 86400000); diff -= d * 86400000;
      const h = Math.floor(diff / 3600000); diff -= h * 3600000;
      const m = Math.floor(diff / 60000); diff -= m * 60000;
      const s = Math.floor(diff / 1000);
      el.innerHTML = ['Days', 'Hours', 'Minutes', 'Seconds']
        .map((label, i) => `<div class="c"><div class="n">${[d, h, m, s][i].toString().padStart(2, '0')}</div><div class="lbl">${label}</div></div>`).join('');
      if (target - now > 0) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  }

  // ---------- Utilities ----------
  function escapeHtml(s = '') {
    return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
  }
  function escapeAttr(s = '') { return String(s).replace(/"/g, '%22'); }

  // Konami egg
  (function konami() {
    const seq = ['ArrowUp', 'ArrowUp', 'ArrowDown', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'ArrowLeft', 'ArrowRight', 'b', 'a'];
    const buf = [];
    window.addEventListener('keydown', e => {
      buf.push(e.key);
      buf.splice(-seq.length - 1, buf.length - seq.length);
      if (seq.every((k, i) => buf[i]?.toLowerCase() === k.toLowerCase())) {
        document.getElementById('egg').classList.toggle('show');
      }
    });
  })();
  </script>
</body>
</html>
