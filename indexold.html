  <style>
    :root{
      /* global theme inspired by your #10 image */
      --bg:#0b0f1a; --bg-2:#11172c; --txt:#e7ecff; --muted:#9aa6c8;
      --brand:#7b7cfb; --accent:#40f2ff; --hot:#ff8a00; --rose:#ff2bd6;
      --glass:rgba(255,255,255,.06); --radius:16px;
      --shadow:0 10px 30px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.04);
    }
    *{box-sizing:border-box} html,body{height:100%}
    body{
      margin:0; color:var(--txt); line-height:1.6;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial;
      background:
        radial-gradient(1400px 800px at 15% 10%, rgba(123,124,251,.10), transparent 60%),
        radial-gradient(1400px 800px at 85% 90%, rgba(64,242,255,.08), transparent 60%),
        linear-gradient(180deg, var(--bg), var(--bg-2));
    }
    a{color:#a9c8ff;text-decoration:none}
    a:focus-visible,button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
    img{max-width:100%;display:block}

    /* NAV with prismatic rail (SVG data-url) */
    header{position:sticky;top:0;z-index:50;border-bottom:1px solid rgba(255,255,255,.06)}
    .nav{
      background: url("data:image/svg+xml;utf8,<?xml version='1.0' encoding='UTF-8'?><svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1600 80' preserveAspectRatio='none'><defs><linearGradient id='bg' x1='0' y1='0' x2='0' y2='1'><stop offset='0%' stop-color='%230b0b1a'/><stop offset='100%' stop-color='%2314142c'/></linearGradient><linearGradient id='rail' x1='0%' y1='0' x2='100%' y2='0'><stop offset='0%' stop-color='%2300c2ff'/><stop offset='25%' stop-color='%237a5cff'/><stop offset='50%' stop-color='%23ff2bd6'/><stop offset='75%' stop-color='%23ff8a00'/><stop offset='100%' stop-color='%2300c2ff'/></linearGradient><linearGradient id='sh' x1='0' y1='0' x2='1' y2='1'><stop offset='0%' stop-color='%2300c2ff' stop-opacity='.18'/><stop offset='100%' stop-color='%23ff2bd6' stop-opacity='.10'/></linearGradient></defs><rect width='1600' height='80' fill='url(%23bg)'/><g opacity='.35'><polygon fill='url(%23sh)' points='60,18 130,10 162,34 94,42'/><polygon fill='url(%23sh)' points='260,22 330,8 372,26 300,40'/><polygon fill='url(%23sh)' points='520,18 585,6 628,26 560,38'/><polygon fill='url(%23sh)' points='900,16 980,8 1020,30 940,38'/><polygon fill='url(%23sh)' points='1180,18 1250,6 1292,26 1224,40'/></g><rect x='0' y='78' width='1600' height='2' fill='url(%23rail)' opacity='.9'/></svg>") center/cover no-repeat;
      backdrop-filter:saturate(120%) blur(8px);
    }
    .nav-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:1rem;padding:.75rem 1rem}
    .brand{display:flex;align-items:center;gap:.6rem}
    .brand img{width:40px;height:40px;border-radius:10px;object-fit:cover;filter:drop-shadow(0 0 8px rgba(64,242,255,.35))}
    .brand b{letter-spacing:.4px}
    .menu{margin-left:auto;display:flex;gap:.3rem;flex-wrap:wrap}
    .menu a{padding:.5rem .75rem;border-radius:10px}
    .menu a[aria-current="page"], .menu a:hover{background:var(--glass);box-shadow:var(--shadow)}

    main{max-width:1200px;margin:0 auto;padding:1rem}
    .hero{
      position:relative;min-height:58vh;border-radius:var(--radius);overflow:hidden;
      display:grid;place-items:center;text-align:center;background:#0e1426 center/cover no-repeat;
      box-shadow:var(--shadow)
    }
    .hero::before{content:"";position:absolute;inset:0;background:linear-gradient(180deg, rgba(0,0,0,.35), rgba(0,0,0,.7))}
    .hero .content{position:relative;padding:2rem}
    .hero h1{font-size:clamp(1.9rem, 2.8vw + 1rem, 3.2rem);margin:.4rem 0 1rem}
    .hero p{color:var(--muted);max-width:820px;margin:0 auto 1rem}
    .btn{display:inline-block;border:1px solid rgba(255,255,255,.12);padding:.8rem 1rem;border-radius:12px;color:var(--txt);transition:transform .08s ease, background .2s}
    .btn:hover{transform:translateY(-1px);background:var(--glass)}
    .btn.primary{background:linear-gradient(90deg, var(--brand), var(--accent));color:#000;border-color:transparent;font-weight:700}

    .section{margin:2.5rem 0}
    .tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem}
    .tile{background:var(--glass);border:1px solid rgba(255,255,255,.08);border-radius:16px;overflow:hidden;cursor:pointer}
    .tile .thumb{height:150px;background:#0e1426 center/cover no-repeat}
    .tile .body{padding:.9rem}
    .tile h3{margin:.2rem 0}
    .tile p{margin:.2rem 0;color:var(--muted)}
    @media (max-width:1000px){.tiles{grid-template-columns:repeat(2,1fr)}}
    @media (max-width:560px){.tiles{grid-template-columns:1fr}}

    /* teaser poster strip */
    .teaser{
      display:grid;grid-template-columns:1fr 1fr;gap:1rem;align-items:center
    }
    .teaser .poster{border-radius:16px;overflow:hidden;border:1px solid rgba(255,255,255,.08);box-shadow:var(--shadow)}
    .soon{
      font-family: 'Trebuchet MS', Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
      letter-spacing: .08em;
      font-size:clamp(2.2rem, 5vw, 4rem);
      text-align:center;
      background:linear-gradient(90deg,#f3d49f,#ffcc80,#ffd24d,#ffa64d);
      -webkit-background-clip:text;background-clip:text;color:transparent;
      text-shadow:0 .04em 0 rgba(0,0,0,.35);
    }
    .soon .o{position:relative;display:inline-block}
    .soon .o::before,.soon .o::after{
      content:"♦";position:absolute;inset:auto;top:55%;transform:translateY(-50%);font-size:.36em;color:#e4a74f
    }
    .soon .o::before{left:-.25em}.soon .o::after{right:-.25em}
    @media (max-width:860px){.teaser{grid-template-columns:1fr}}

    /* timeline, about, roles */
    .timeline{list-style:none;padding:0;margin:1rem 0 0;border-left:2px dashed rgba(255,255,255,.12)}
    .timeline li{position:relative;margin-left:1.2rem;padding:.4rem 0 1rem}
    .timeline li::before{content:"";position:absolute;left:-10px;top:.55rem;width:10px;height:10px;border-radius:50%;background:linear-gradient(90deg,var(--brand),var(--accent));box-shadow:0 0 0 4px rgba(123,124,251,.15)}
    .card{background:var(--glass);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:1rem;box-shadow:var(--shadow)}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
    @media (max-width:860px){.grid-2{grid-template-columns:1fr}}

    /* footer */
    footer{max-width:1200px;margin:2rem auto 1rem;padding:1rem;border-top:1px solid rgba(255,255,255,.08);display:flex;justify-content:space-between;align-items:center;gap:1rem}
    .chip{display:inline-block;background:var(--glass);border:1px solid rgba(255,255,255,.08);padding:.35rem .6rem;border-radius:999px;color:var(--txt)}
    
    /* Router page shell + product themes */
    .page{margin:2rem 0}
    .proj-hero{position:relative;border-radius:16px;overflow:hidden;min-height:40vh;background:#0e1426 center/cover no-repeat;display:grid;place-items:center;text-align:center;box-shadow:var(--shadow)}
    .proj-hero::before{content:"";position:absolute;inset:0;background:linear-gradient(180deg, rgba(0,0,0,.35), rgba(0,0,0,.75))}
    .proj-hero .inner{position:relative;padding:2rem}
    .tags{display:flex;gap:.4rem;flex-wrap:wrap;justify-content:center;margin:1rem 0}
    .tag{font-size:.8rem;background:rgba(64,242,255,.12);border:1px solid rgba(64,242,255,.25);color:#b8fbff;padding:.2rem .6rem;border-radius:999px}

    /* Countdown */
    .countbox{display:flex;gap:.6rem;justify-content:center;margin:1rem 0;flex-wrap:wrap}
    .countbox .c{min-width:90px;text-align:center;background:var(--glass);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:.5rem}
    .countbox .n{font-size:1.6rem;font-weight:800}

    /* Easter-egg train bg (toggle with Konami code) */
    .egg{position:fixed;inset:0;pointer-events:none;opacity:0;transition:opacity .4s ease;background:rgba(0,0,0,.65) url('img-train-bg.jpg') center/cover no-repeat}
    .egg.show{opacity:.35}

  </style>
</head>

  };
  function navigate(){
    const hash = location.hash || '#/home';
    const path = hash.slice(1);                   // "/project/steedtrek?x=y"
    const [raw, qs] = path.split('?');
    if(raw.startsWith('/project/')){
      const id = raw.split('/')[2];
      routes['/project']({id, qs});
      setActive(null);
      return;
    }
    (routes[raw]||routes['/home'])();
    setActive(raw);
  }
  function setActive(raw){
    document.querySelectorAll('.menu a[data-link]').forEach(a=>{
      a.setAttribute('aria-current', a.getAttribute('href')===`#${raw}`? 'page':'false');
    });
    requestAnimationFrame(()=>app.focus());
  }
  window.addEventListener('hashchange', navigate);
  window.addEventListener('DOMContentLoaded', ()=>{
    $('#year').textContent = new Date().getFullYear();
    navigate();
  });

  // ---------- Views ----------
  function renderHome(){
    app.innerHTML = $('#tpl-home').innerHTML;
    // tiles click
    app.querySelectorAll('.tile[data-nav]').forEach(t=>{
      t.addEventListener('click', ()=>location.hash = t.getAttribute('data-nav'));
    });
  }
  function renderAbout(){ app.innerHTML = $('#tpl-about').innerHTML; }
  function renderManifesto(){ app.innerHTML = $('#tpl-manifesto').innerHTML; }
  function renderCredits(){
    app.innerHTML = $('#tpl-credits').innerHTML;
    $('#year2').textContent = new Date().getFullYear();
  }

  function renderProjects(){
    // simple card list assembled from DATA.projects
    const list = Object.values(DATA.projects);
    let html = `<section class="page"><h2>Projects</h2><div class="tiles">`;
    html += list.map(p=>`
      <article class="tile" data-nav="#/project/${encodeURIComponent(p.id)}">
        <div class="thumb" style="background-image:url('${escapeAttr(p.logo)}')"></div>
        <div class="body"><h3>${escapeHtml(p.title)}</h3><p>${escapeHtml(p.desc)}</p></div>
      </article>
    `).join('');
    html += `</div></section>`;
    app.innerHTML = html;
    app.querySelectorAll('.tile').forEach(t=>t.addEventListener('click', ()=>location.hash=t.getAttribute('data-nav')));
  }

  function renderProject({id}){
    const p = DATA.projects[id]; if(!p){ app.innerHTML = `<section class="page card"><p>Project not found.</p></section>`; return; }
    app.innerHTML = $('#tpl-project').innerHTML;
    $('#projHero').style.backgroundImage = `url('${escapeAttr(p.hero)}')`;
    $('#projLogo').src = p.logo; $('#projLogo').alt = p.title + ' logo';
    $('#projTitle').textContent = p.title;
    $('#projDesc').textContent = p.desc;
    $('#projTags').innerHTML = (p.tags||[]).map(t=>`<span class="tag">${escapeHtml(t)}</span>`).join('');
    $('#projLinks').innerHTML = (p.links||[]).map(l=>`<a class="btn" href="${escapeAttr(l.href)}">${escapeHtml(l.label)} →</a>`).join(' ');
    $('#projBody').innerHTML = p.body || '';
  }

  function renderTeaser(){ app.innerHTML = $('#tpl-teaser').innerHTML; }

  function renderFootage(){
    app.innerHTML = $('#tpl-footage').innerHTML;
    // Countdown to Jan 1, 2026 00:00:00 local
    const target = new Date('2026-01-01T00:00:00');
    $('#targetDate').textContent = target.toString();
    const el = $('#countdown');
    const tick = ()=>{
      const now = new Date();
      let diff = Math.max(0, target - now);
      const d = Math.floor(diff/86400000); diff -= d*86400000;
      const h = Math.floor(diff/3600000); diff -= h*3600000;
      const m = Math.floor(diff/60000); diff -= m*60000;
      const s = Math.floor(diff/1000);
      el.innerHTML = ['Days', 'Hours','Minutes','Seconds']
        .map((label,i)=>`<div class="c"><div class="n">${
          [d,h,m,s][i].toString().padStart(2,'0')
        }</div><div>${label}</div></div>`).join('');
      if(target-now>0) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  }

  // ---------- Utilities ----------
  function escapeHtml(s=''){ return String(s).replace(/[&<>"']/g,c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c])); }
  function escapeAttr(s=''){ return String(s).replace(/"/g,'%22'); }

  // Konami egg: ↑ ↑ ↓ ↓ ← → ← → B A (toggles train overlay)
  (function konami(){
    const seq = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];
    const buf = [];
    window.addEventListener('keydown', e=>{
      buf.push(e.key); buf.splice(-seq.length-1, buf.length-seq.length);
      if(seq.every((k,i)=>buf[i]?.toLowerCase()===k.toLowerCase())){
        document.getElementById('egg').classList.toggle('show');
      }
    });
  })();
  </script>
</body>
</html>
