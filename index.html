<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Zengine — Digital Architect · Services Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Zengine — Digital Architect. 109+ services spanning web development, AI, legal, creative, real estate, and more. Florida & Texas. Building physical and digital worlds." />
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><defs><linearGradient id='g' x1='0' x2='1'><stop stop-color='%2387ceeb'/><stop offset='1' stop-color='%23ff7f6e'/></linearGradient></defs><rect rx='12' width='64' height='64' fill='%23071828'/><path d='M12 44V20h12v16h18v8H12z' fill='url(%23g)'/><circle cx='46' cy='24' r='7' fill='url(%23g)'/></svg>" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap');

    :root {
      --bg: #060f1a;
      --bg-2: #081525;
      --bg-card: rgba(255,255,255,.045);
      --txt: #eef4ff;
      --muted: #7a9dbf;
      --muted2: #4a6a85;
      --sky: #87ceeb;
      --sky-dim: rgba(135,206,235,.15);
      --coral: #ff7f6e;
      --coral-dim: rgba(255,127,110,.12);
      --peach: #ffb38a;
      --orange: #ff8c42;
      --mint: #6de8c8;
      --gold: #f5c842;
      --violet: #a78bfa;
      --glass: rgba(255,255,255,.042);
      --glass-border: rgba(255,255,255,.085);
      --glass-hover: rgba(255,255,255,.075);
      --radius: 20px;
      --radius-sm: 13px;
      --radius-xs: 8px;
      --shadow: 0 8px 32px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.05);
      --shadow-lift: 0 20px 60px rgba(0,0,0,.6), 0 4px 16px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.07);
      --glow-sky: 0 0 30px rgba(135,206,235,.2);
      --glow-coral: 0 0 30px rgba(255,127,110,.2);
      --font-display: 'Syne', 'Georgia', serif;
      --font-body: 'DM Sans', 'Georgia', ui-serif, serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      color: var(--txt);
      line-height: 1.65;
      font-family: var(--font-body);
      font-size: 15px;
      background:
        radial-gradient(ellipse 1400px 700px at -5% -5%, rgba(135,206,235,.09) 0%, transparent 55%),
        radial-gradient(ellipse 1000px 800px at 105% 90%, rgba(255,127,110,.08) 0%, transparent 55%),
        radial-gradient(ellipse 600px 500px at 50% 40%, rgba(109,232,200,.03) 0%, transparent 60%),
        linear-gradient(170deg, var(--bg) 0%, #091a2e 45%, var(--bg-2) 100%);
      background-attachment: fixed;
      min-height: 100vh;
    }
    a { color: var(--sky); text-decoration: none; }
    a:focus-visible, button:focus-visible { outline: 2px solid var(--coral); outline-offset: 3px; border-radius: 4px; }
    img { max-width: 100%; display: block; }
    h1, h2, h3, h4 { font-family: var(--font-display); line-height: 1.2; }
    p { margin-top: 0; }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: rgba(135,206,235,.2); border-radius: 3px; }

    /* ═══════════════ NAV ═══════════════ */
    header { position: sticky; top: 0; z-index: 100; }
    .nav-wrap {
      background: rgba(6,15,26,.88);
      backdrop-filter: saturate(160%) blur(16px);
      border-bottom: 1px solid rgba(135,206,235,.1);
    }
    /* Prismatic rail */
    .nav-rail {
      height: 3px;
      background: linear-gradient(90deg, var(--sky) 0%, var(--mint) 20%, var(--coral) 45%, var(--peach) 65%, var(--orange) 82%, var(--sky) 100%);
      background-size: 200% 100%;
      animation: railShift 8s linear infinite;
    }
    @keyframes railShift { to { background-position: 200% 0; } }
    .nav-inner {
      max-width: 1280px; margin: 0 auto;
      display: flex; align-items: center; gap: .75rem;
      padding: .65rem 1rem;
    }
    .brand { display: flex; align-items: center; gap: .55rem; }
    .brand img {
      width: 36px; height: 36px; border-radius: 10px; object-fit: cover;
      filter: drop-shadow(0 0 10px rgba(135,206,235,.4));
      transition: filter .3s;
    }
    .brand img:hover { filter: drop-shadow(0 0 18px rgba(255,127,110,.55)); }
    .brand b { font-family: var(--font-display); font-weight: 800; font-size: 1.1rem; letter-spacing: .5px; }
    .nav-menu { margin-left: auto; display: flex; gap: .15rem; flex-wrap: wrap; align-items: center; }
    .nav-menu a {
      padding: .4rem .65rem; border-radius: 9px; color: var(--muted);
      font-family: var(--font-display); font-size: .82rem; font-weight: 600;
      transition: color .2s, background .2s;
      white-space: nowrap;
    }
    .nav-menu a[aria-current="page"],
    .nav-menu a:hover { color: var(--txt); background: var(--glass); }
    .nav-menu .btn-nav {
      background: linear-gradient(100deg, var(--coral), var(--orange));
      color: #fff; border-radius: 9px; padding: .38rem .8rem;
      font-family: var(--font-display); font-size: .82rem; font-weight: 700;
      transition: transform .12s, box-shadow .2s;
    }
    .nav-menu .btn-nav:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(255,127,110,.35); }

    /* ═══════════════ MAIN ═══════════════ */
    main { max-width: 1280px; margin: 0 auto; padding: 1rem; }

    /* ═══════════════ HERO ═══════════════ */
    .hero {
      position: relative; border-radius: var(--radius); overflow: hidden;
      min-height: 58vh; display: grid; place-items: center; text-align: center;
      border: 1px solid rgba(135,206,235,.12);
      box-shadow: var(--shadow-lift);
    }
    .hero-bg {
      position: absolute; inset: 0;
      background: linear-gradient(135deg, #061220 0%, #0d2040 40%, #091828 100%);
    }
    /* Circuit grid overlay */
    .hero-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(135,206,235,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(135,206,235,.035) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 85% 85% at 50% 55%, black 30%, transparent 80%);
    }
    /* Floating orbs */
    .hero-orb {
      position: absolute; border-radius: 50%; filter: blur(70px); pointer-events: none;
    }
    .hero-orb-1 { width: 400px; height: 400px; background: rgba(135,206,235,.07); top: -100px; left: -50px; animation: orbFloat 12s ease-in-out infinite; }
    .hero-orb-2 { width: 350px; height: 350px; background: rgba(255,127,110,.07); bottom: -80px; right: -30px; animation: orbFloat 15s ease-in-out infinite reverse; }
    .hero-orb-3 { width: 200px; height: 200px; background: rgba(109,232,200,.05); top: 30%; left: 60%; animation: orbFloat 18s ease-in-out infinite 3s; }
    @keyframes orbFloat { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(20px,-20px) scale(1.05); } }

    .hero-content { position: relative; z-index: 1; padding: 2.5rem 1.5rem; max-width: 780px; }
    .eyebrow {
      display: inline-flex; align-items: center; gap: .5rem;
      font-family: var(--font-display); font-size: .72rem; font-weight: 700;
      letter-spacing: .2em; text-transform: uppercase; color: var(--sky);
      background: rgba(135,206,235,.1); border: 1px solid rgba(135,206,235,.22);
      padding: .3rem .9rem; border-radius: 999px; margin-bottom: 1.1rem;
    }
    .hero h1 {
      font-size: clamp(2rem, 4vw + .5rem, 3.8rem);
      font-weight: 800; margin-bottom: 1rem;
    }
    .hero h1 .grad {
      background: linear-gradient(95deg, var(--sky) 0%, var(--mint) 40%, var(--coral) 80%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .hero p { color: var(--muted); font-size: 1.05rem; max-width: 580px; margin: 0 auto 1.5rem; }
    .hero-btns { display: flex; gap: .75rem; justify-content: center; flex-wrap: wrap; }

    /* BUTTONS */
    .btn {
      display: inline-flex; align-items: center; gap: .45rem;
      padding: .72rem 1.25rem; border-radius: var(--radius-sm);
      font-family: var(--font-display); font-size: .88rem; font-weight: 700;
      border: 1px solid var(--glass-border); color: var(--txt);
      background: var(--glass); cursor: pointer;
      transition: transform .12s, background .2s, box-shadow .2s;
      white-space: nowrap;
    }
    .btn:hover { transform: translateY(-2px); background: var(--glass-hover); box-shadow: var(--shadow-lift); }
    .btn.primary {
      background: linear-gradient(100deg, var(--coral), var(--orange));
      border-color: transparent; color: #fff;
      box-shadow: 0 4px 20px rgba(255,127,110,.28);
    }
    .btn.primary:hover { box-shadow: 0 8px 32px rgba(255,127,110,.45); }
    .btn.sky {
      background: linear-gradient(100deg, var(--sky), var(--mint));
      border-color: transparent; color: #060f1a;
      box-shadow: 0 4px 20px rgba(135,206,235,.22);
    }
    .btn.sky:hover { box-shadow: 0 8px 32px rgba(135,206,235,.38); }
    .btn.ghost { background: transparent; color: var(--muted); }
    .btn.ghost:hover { color: var(--txt); background: var(--glass); }

    /* ═══════════════ SECTION ═══════════════ */
    .section { margin: 2.25rem 0; }
    .section-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.25rem; }
    .section-header h2 { margin: 0; font-size: clamp(1.25rem, 2vw, 1.65rem); font-weight: 800; white-space: nowrap; }
    .section-header .line { flex: 1; height: 1px; background: linear-gradient(90deg, rgba(135,206,235,.25), transparent); min-width: 20px; }

    /* ═══════════════ CARDS ═══════════════ */
    .card {
      background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: var(--radius); padding: 1.35rem;
      box-shadow: var(--shadow);
      transition: box-shadow .25s, border-color .25s, transform .15s;
    }
    .card:hover { box-shadow: var(--shadow-lift); }
    .card.coral:hover { border-color: rgba(255,127,110,.22); box-shadow: var(--shadow-lift), 0 0 40px rgba(255,127,110,.07); }
    .card.sky-hover:hover { border-color: rgba(135,206,235,.22); }

    /* ═══════════════ STATS ROW ═══════════════ */
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: .75rem; }
    .stat-box {
      background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm); padding: 1rem; text-align: center;
      box-shadow: var(--shadow);
      transition: transform .15s, border-color .2s;
    }
    .stat-box:hover { transform: translateY(-2px); border-color: rgba(135,206,235,.22); }
    .stat-num {
      font-family: var(--font-display); font-size: 1.7rem; font-weight: 800;
      background: linear-gradient(90deg, var(--sky), var(--mint));
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .stat-label { font-size: .76rem; color: var(--muted); font-family: var(--font-display); margin-top: .2rem; font-weight: 600; letter-spacing: .05em; }

    /* ═══════════════ TILES ═══════════════ */
    .tiles { display: grid; grid-template-columns: repeat(4, 1fr); gap: .9rem; }
    .tile {
      background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: var(--radius); overflow: hidden; cursor: pointer;
      transition: transform .18s, box-shadow .2s, border-color .2s;
    }
    .tile:hover { transform: translateY(-5px); box-shadow: var(--shadow-lift); border-color: rgba(135,206,235,.2); }
    .tile .thumb { height: 150px; background: #0d1e30 center/cover no-repeat; position: relative; }
    .tile .thumb::after { content: ""; position: absolute; inset: 0; background: linear-gradient(to top, rgba(6,15,26,.8), transparent 60%); }
    .tile .tbody { padding: .9rem; }
    .tile h3 { font-family: var(--font-display); font-size: .92rem; font-weight: 700; margin-bottom: .3rem; }
    .tile p { color: var(--muted); font-size: .82rem; line-height: 1.5; }

    /* ═══════════════ PIPELINE ═══════════════ */
    .pipeline { display: grid; grid-template-columns: repeat(4, 1fr); gap: .8rem; }
    .pipe-step {
      background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: var(--radius); padding: 1.1rem;
      box-shadow: var(--shadow);
      transition: transform .15s, box-shadow .2s;
    }
    .pipe-step:hover { transform: translateY(-3px); box-shadow: var(--shadow-lift); }
    .pipe-num {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display); font-weight: 800; font-size: .82rem;
      margin-bottom: .7rem;
    }
    .n1 { background: rgba(135,206,235,.13); color: var(--sky); border: 1px solid rgba(135,206,235,.3); }
    .n2 { background: rgba(109,232,200,.13); color: var(--mint); border: 1px solid rgba(109,232,200,.3); }
    .n3 { background: rgba(255,179,138,.13); color: var(--peach); border: 1px solid rgba(255,179,138,.3); }
    .n4 { background: rgba(255,127,110,.13); color: var(--coral); border: 1px solid rgba(255,127,110,.3); }
    .pipe-step h4 { font-family: var(--font-display); font-size: .92rem; font-weight: 700; margin-bottom: .45rem; }
    .pipe-step ul { padding-left: 1.1rem; color: var(--muted); font-size: .8rem; line-height: 1.65; }

    /* ═══════════════ GRID HELPERS ═══════════════ */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: .9rem; }

    /* ═══════════════ MATRIX ═══════════════ */
    .matrix { display: grid; grid-template-columns: repeat(3, 1fr); gap: .8rem; }
    .matrix-cell {
      background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm); padding: 1.05rem;
      transition: transform .15s, border-color .2s;
    }
    .matrix-cell:hover { transform: translateY(-2px); border-color: rgba(135,206,235,.22); }
    .matrix-cell .icon { font-size: 1.45rem; margin-bottom: .5rem; }
    .matrix-cell h4 { font-family: var(--font-display); font-size: .88rem; font-weight: 700; color: var(--sky); margin-bottom: .3rem; }
    .matrix-cell p { color: var(--muted); font-size: .8rem; line-height: 1.5; }

    /* ═══════════════ TEASER ═══════════════ */
    .teaser { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; align-items: center; }
    .teaser .poster { border-radius: var(--radius); overflow: hidden; border: 1px solid var(--glass-border); box-shadow: var(--shadow-lift); }
    .soon {
      font-family: var(--font-display); letter-spacing: .06em;
      font-size: clamp(2.2rem, 5vw, 4.2rem); font-weight: 800;
      text-align: center;
      background: linear-gradient(95deg, var(--coral), var(--peach), var(--orange));
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .soon .o { position: relative; display: inline-block; }
    .soon .o::before, .soon .o::after { content: "♦"; position: absolute; top: 55%; transform: translateY(-50%); font-size: .33em; color: var(--coral); }
    .soon .o::before { left: -.22em; } .soon .o::after { right: -.22em; }

    /* ═══════════════ POSITION GRID ═══════════════ */
    .position-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: .7rem; }
    .pos-pill {
      background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm); padding: .9rem .8rem;
      text-align: center; font-family: var(--font-body); font-size: .82rem;
      transition: transform .15s, background .2s, border-color .2s;
      cursor: default;
    }
    .pos-pill:hover { transform: translateY(-2px); background: rgba(135,206,235,.07); border-color: rgba(135,206,235,.22); }
    .pos-pill .pill-icon { font-size: 1.35rem; display: block; margin-bottom: .35rem; }
    .pos-pill small { color: var(--muted); display: block; margin-top: .15rem; font-size: .76rem; }

    /* ═══════════════ MANIFESTO ═══════════════ */
    .manifesto-pull {
      font-size: clamp(1.2rem, 2vw, 1.65rem);
      font-style: italic; font-family: var(--font-display);
      color: var(--txt); border-left: 3px solid var(--coral);
      padding-left: 1.2rem; margin: 1.35rem 0; line-height: 1.45;
    }
    .manifesto-pull.sky { border-color: var(--sky); }

    /* ═══════════════ ICP LIST ═══════════════ */
    .icp-list { list-style: none; padding: 0; display: flex; flex-direction: column; gap: .5rem; }
    .icp-list li { display: flex; align-items: flex-start; gap: .7rem; font-size: .9rem; }
    .icp-list li::before { content: "→"; color: var(--coral); font-weight: 700; flex-shrink: 0; }

    /* ═══════════════ TAGS / CHIPS ═══════════════ */
    .tags { display: flex; gap: .4rem; flex-wrap: wrap; justify-content: center; margin: .75rem 0; }
    .tag { font-size: .75rem; background: rgba(135,206,235,.1); border: 1px solid rgba(135,206,235,.2); color: #b8e8ff; padding: .18rem .6rem; border-radius: 999px; font-family: var(--font-display); font-weight: 600; }
    .chip { display: inline-block; background: var(--glass); border: 1px solid var(--glass-border); padding: .32rem .7rem; border-radius: 999px; color: var(--txt); font-family: var(--font-display); font-size: .82rem; font-weight: 600; transition: background .2s; }
    .chip:hover { background: rgba(255,255,255,.1); }

    /* ═══════════════ PROJ HERO ═══════════════ */
    .proj-hero { position: relative; border-radius: var(--radius); overflow: hidden; min-height: 38vh; background: #0d1e30 center/cover no-repeat; display: grid; place-items: center; text-align: center; box-shadow: var(--shadow-lift); border: 1px solid var(--glass-border); }
    .proj-hero::before { content: ""; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,.25), rgba(6,15,26,.88)); }
    .proj-hero .inner { position: relative; padding: 2rem 1.5rem; }

    /* ═══════════════ COUNTDOWN ═══════════════ */
    .countbox { display: flex; gap: .65rem; justify-content: center; margin: 1rem 0; flex-wrap: wrap; }
    .countbox .c { min-width: 76px; text-align: center; background: var(--glass); border: 1px solid var(--glass-border); border-radius: var(--radius-sm); padding: .6rem; }
    .countbox .n { font-family: var(--font-display); font-size: 1.55rem; font-weight: 800; color: var(--sky); }
    .countbox .lbl { font-size: .68rem; color: var(--muted); font-family: var(--font-display); font-weight: 700; letter-spacing: .1em; text-transform: uppercase; margin-top: .1rem; }

    /* ═══════════════ CTA BLOCK ═══════════════ */
    .cta-block {
      background: linear-gradient(135deg, rgba(135,206,235,.07), rgba(255,127,110,.07));
      border: 1px solid rgba(135,206,235,.16); border-radius: var(--radius);
      padding: 2.25rem 1.5rem; text-align: center; box-shadow: var(--shadow-lift);
    }
    .cta-block h2 { font-size: clamp(1.3rem, 2.5vw, 2rem); margin-bottom: .75rem; }
    .cta-block p { color: var(--muted); max-width: 520px; margin: 0 auto 1.5rem; }

    /* ═══════════════════════════════════════
       SERVICES PORTAL — CROWN JEWEL
    ═══════════════════════════════════════ */

    /* Portal nav tabs */
    .portal-tabs {
      display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: 1.5rem;
    }
    .portal-tab {
      display: flex; align-items: center; gap: .4rem;
      padding: .5rem .95rem; border-radius: 999px;
      font-family: var(--font-display); font-size: .8rem; font-weight: 700;
      border: 1px solid var(--glass-border); background: var(--glass);
      color: var(--muted); cursor: pointer;
      transition: all .2s;
    }
    .portal-tab:hover { color: var(--txt); background: var(--glass-hover); }
    .portal-tab.active { color: var(--txt); background: rgba(135,206,235,.12); border-color: rgba(135,206,235,.35); box-shadow: 0 0 20px rgba(135,206,235,.12); }
    .portal-tab.active-coral { background: rgba(255,127,110,.12); border-color: rgba(255,127,110,.35); color: var(--coral); }
    .portal-tab.active-mint { background: rgba(109,232,200,.12); border-color: rgba(109,232,200,.35); color: var(--mint); }
    .portal-tab.active-gold { background: rgba(245,200,66,.12); border-color: rgba(245,200,66,.35); color: var(--gold); }
    .portal-tab.active-violet { background: rgba(167,139,250,.12); border-color: rgba(167,139,250,.35); color: var(--violet); }
    .portal-tab .tab-count {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 20px; height: 20px; padding: 0 5px;
      background: rgba(255,255,255,.1); border-radius: 999px;
      font-size: .7rem; font-weight: 800;
    }

    /* Portal panel */
    .portal-panel { display: none; animation: fadeUp .3s ease; }
    .portal-panel.visible { display: block; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* Portal header banner */
    .portal-banner {
      border-radius: var(--radius); padding: 1.4rem 1.5rem; margin-bottom: 1.25rem;
      border: 1px solid var(--glass-border); position: relative; overflow: hidden;
    }
    .portal-banner::before {
      content: attr(data-icon);
      position: absolute; right: 1.5rem; top: 50%; transform: translateY(-50%);
      font-size: 5rem; opacity: .07; pointer-events: none;
    }
    .portal-banner.blue { background: linear-gradient(135deg, rgba(135,206,235,.1), rgba(6,15,26,0)); border-color: rgba(135,206,235,.2); }
    .portal-banner.red { background: linear-gradient(135deg, rgba(255,127,110,.1), rgba(6,15,26,0)); border-color: rgba(255,127,110,.2); }

const app = document.getElementById('app');

const routes = {
  '/home': renderHome,
  '/about': renderAbout,
  '/services': renderServices,
  '/projects': renderProjects,
  '/project': renderProject,
  '/steed-trek-teaser': renderTeaser,
  '/steed-trek-footage': renderFootage,
  '/manifesto': renderManifesto,
  '/credits': renderCredits
};

function navigate() {
  const hash = location.hash || '#/home';
  const path = hash.slice(1);
  const [raw] = path.split('?');
  if (raw.startsWith('/project/')) {
    renderProject({ id: raw.split('/')[2] });
    setActive(null);
    return;
  }
  (routes[raw] || routes['/home'])();
  setActive(raw);
  window.scrollTo(0, 0);
  app.focus();
}

function setActive(raw) {
  document.querySelectorAll('.nav-menu a[data-link]').forEach(a => {
    a.setAttribute('aria-current', a.getAttribute('href') === `#${raw}` ? 'page' : 'false');
  });
}

window.addEventListener('hashchange', navigate);
window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('year').textContent = new Date().getFullYear();
  navigate();
});

function renderProject({ id }) {
  const p = PROJECTS[id];
  if (!p) { app.innerHTML = '<section class="page card"><p>Project not found. <a href="#/projects" class="btn sky" style="display:inline-flex;margin-top:.75rem">← All Projects</a></p></section>'; return; }
  app.innerHTML = document.getElementById('tpl-project').innerHTML;

  // Blurred background uses same src as logo
  const bgBlur = document.getElementById('projBgBlur');
  if (bgBlur) bgBlur.style.backgroundImage = `url('${p.hero}')`;

  const logo = document.getElementById('projLogo');
  if (logo) { logo.src = p.logo; logo.alt = p.title + ' logo'; }

  const titleEl = document.getElementById('projTitle');
  if (titleEl) titleEl.textContent = p.title;

  const descEl = document.getElementById('projDesc');
  if (descEl) descEl.textContent = p.desc;

  const tagsEl = document.getElementById('projTags');
  if (tagsEl) tagsEl.innerHTML = (p.tags||[]).map(t => `<span class="tag">${escH(t)}</span>`).join('');

  const linksEl = document.getElementById('projLinks');
  if (linksEl) linksEl.innerHTML = (p.links||[]).map(l => `<a class="btn sky" href="${escH(l.href)}">${escH(l.label)} →</a>`).join('');

  const bodyEl = document.getElementById('projBody');
  if (bodyEl) bodyEl.innerHTML = p.body || '';
}

function renderFootage() {
  app.innerHTML = document.getElementById('tpl-footage').innerHTML;
  const target = new Date('2026-06-01T00:00:00');
  document.getElementById('targetDate').textContent = 'Target reveal: ' + target.toDateString();
  const el = document.getElementById('countdown');
  const tick = () => {
    let diff = Math.max(0, target - new Date());
    const d=Math.floor(diff/86400000); diff-=d*86400000;
    const h=Math.floor(diff/3600000); diff-=h*3600000;
    const m=Math.floor(diff/60000); diff-=m*60000;
    const s=Math.floor(diff/1000);
    el.innerHTML = [['Days',d],['Hours',h],['Mins',m],['Secs',s]].map(([l,v])=>`<div class="c"><div class="n">${String(v).padStart(2,'0')}</div><div class="lbl">${l}</div></div>`).join('');
    if (target - new Date() > 0) setTimeout(tick, 1000);
  };
  tick();
}

        `).join('')}
      </div>
    </div>
  `).join('');

  // Tab click
  tabsEl.addEventListener('click', e => {
    const btn = e.target.closest('.portal-tab');
    if (!btn) return;
    const id = btn.dataset.portal;
    if (id === activePortal) return;
    activePortal = id;

    tabsEl.querySelectorAll('.portal-tab').forEach(t => {
      t.classList.remove('active', 'active-coral', 'active-mint', 'active-gold', 'active-violet');
      t.setAttribute('aria-pressed', 'false');
    });
    btn.classList.add('active');
    btn.setAttribute('aria-pressed', 'true');

    panelsEl.querySelectorAll('.portal-panel').forEach(p => p.classList.remove('visible'));
    const panel = document.getElementById('panel-' + id);
    if (panel) panel.classList.add('visible');
  });

  // Search
  const searchInput = document.getElementById('svcSearch');
  const searchResults = document.getElementById('searchResults');

  searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim().toLowerCase();
    if (!q) {
      searchResults.style.display = 'none';
      tabsEl.style.display = '';
      panelsEl.style.display = '';
      return;
    }
    tabsEl.style.display = 'none';
    panelsEl.style.display = 'none';
    searchResults.style.display = '';

    const matches = [];
    PORTALS.forEach(portal => {
      portal.services.forEach(svc => {
        if (svc.title.toLowerCase().includes(q) || svc.meta.toLowerCase().includes(q)) {
          matches.push({ portal, svc });
        }
      });
    });

    if (matches.length === 0) {
      searchResults.innerHTML = `<div class="card" style="text-align:center;padding:2rem"><p style="color:var(--muted)">No services found for "<strong>${escH(q)}</strong>"</p><a class="btn sky" href="mailto:team@zengine.site">Request a Custom Service →</a></div>`;
    } else {
      searchResults.innerHTML = `
        <p style="color:var(--muted);font-size:.84rem;margin-bottom:.85rem">${matches.length} service${matches.length!==1?'s':''} matching "<strong style="color:var(--txt)">${escH(q)}</strong>"</p>
        <div class="service-grid">
          ${matches.map(({portal,svc}) => `
            <div class="svc-card ${portal.hoverClass}">
              <div style="font-size:.68rem;color:var(--muted);font-family:var(--font-display);font-weight:700;margin-bottom:.3rem;text-transform:uppercase;letter-spacing:.08em">${portal.icon} ${portal.label}</div>
              <div class="svc-title"><span class="svc-icon">${svc.icon}</span>${escH(svc.title)}</div>
              <div class="svc-meta">${escH(svc.meta)}</div>
            </div>
          `).join('')}
        </div>
      `;
    }
  });

  // Clear search when clicking a tab
  tabsEl.addEventListener('click', () => {
    searchInput.value = '';
    searchResults.style.display = 'none';
    tabsEl.style.display = '';
    panelsEl.style.display = '';
  });
}

// ════════════════════════════════════

function escH(s='') {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// Konami
(function(){
  const seq = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];
  const buf = [];
  let eggActive = false;

    buf.push(e.key);
    buf.splice(-seq.length - 1, buf.length - seq.length);

        document.title = '🎮 ZENGINE UNLOCKED — We Are The Change';

        setTimeout(() => {
          document.body.style.filter = '';
          document.title = 'Zengine — Digital Architect · Services Portal';
          eggActive = false;
        }, 2000);
      }
    }
  });
})();
