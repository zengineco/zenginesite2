  <style>
    /* ============================================================
       FONT IMPORT — must be absolute first line of <style>
       Fallback chains per permanent ruleset:
         Syne    → Impact, fantasy
         DM Sans → Georgia, ui-serif, serif
    ============================================================ */
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap');

    /* ============================================================
       ZG CRYSTAL DESIGN SYSTEM v1.2.0
       Pulled directly from ZG crystal monogram photo:
         - Near-black background matching the photo bg (#0a0b0f)
         - Chrome/silver glass surfaces — the letterform material
         - Cyan/ice-blue primary accent — the cool cast of the crystal
         - Prismatic rainbow ONLY as a controlled streak detail
           (nav rail, section accents, hover moments) — not splattered
         - Emojis provide all warmth — no competing warm palette
    ============================================================ */
    :root {
      /* Core backgrounds — matches ZG photo background exactly */
      --bg:       #0a0b0f;
      --bg-2:     #0d0e14;
      --bg-3:     #111318;
      --txt:      #e4edf5;
      --muted:    #6878a0;
      --muted2:   #38435a;

      /* Cyan / ice-blue — primary accent, the crystal's cool cast */
      --cyan:       #7dd8f0;
      --cyan-dim:   #4ab8d8;
      --cyan-pale:  #a8e8f8;
      --cyan-glow:  rgba(125,216,240,.18);
      --cyan-edge:  rgba(125,216,240,.22);

      /* Chrome / silver — the glass surface material */
      --chrome:      #c4d0e4;
      --chrome-mid:  #7888a8;
      --chrome-dim:  #38445c;
      --chrome-edge: rgba(196,208,228,.14);
      --chrome-glow: rgba(196,208,228,.06);

      /* Prismatic streak — controlled single-burst rainbow */
      /* Used ONLY on: nav rail, section header rule, hover accent moments */
      --prism-streak: linear-gradient(90deg,
        var(--cyan) 0%, var(--chrome-mid) 14%, var(--cyan-pale) 28%,
        var(--cyan) 42%, #7dd8f0 56%, var(--chrome) 72%,
        var(--chrome-mid) 86%, var(--cyan) 100%
      );

      /* Glass surfaces — very dark tinted */
      --glass:        rgba(196,208,228,.038);
      --glass-border: rgba(196,208,228,.09);
      --glass-hover:  rgba(196,208,228,.07);
      --glass-shine:  rgba(255,255,255,.05);

      /* Radius */
      --radius:    20px;
      --radius-sm: 13px;

      /* Shadows */
      --shadow:      0 8px 32px rgba(0,0,0,.75), inset 0 1px 0 rgba(255,255,255,.04);
      --shadow-lift: 0 20px 60px rgba(0,0,0,.85), 0 4px 20px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.05);
      --shadow-cyan: 0 8px 32px rgba(125,216,240,.14);

      /* Typography */
      --font-display: 'Syne', Impact, fantasy;
      --font-body:    'DM Sans', Georgia, ui-serif, serif;
    }

    /* ============================================================
       RESET & BASE
    ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      color: var(--txt);
      line-height: 1.65;
      font-family: var(--font-body);
      font-size: 15px;
      background:
        radial-gradient(ellipse 1400px 800px at -8% -5%,  rgba(125,216,240,.05) 0%, transparent 55%),
        radial-gradient(ellipse 1000px 700px at 108% 95%, rgba(125,216,240,.04) 0%, transparent 55%),
        radial-gradient(ellipse 600px 500px at 50% 42%,   rgba(196,208,228,.02) 0%, transparent 60%),
        linear-gradient(170deg, var(--bg) 0%, #0c0e14 50%, var(--bg-2) 100%);
      background-attachment: fixed;
      min-height: 100vh;
    }
    a { color: var(--chrome); text-decoration: none; }
    a:focus-visible, button:focus-visible {
      outline: 2px solid var(--cyan);
      outline-offset: 3px;
      border-radius: 4px;
    }
    img { max-width: 100%; display: block; }
    h1, h2, h3, h4 { font-family: var(--font-display); line-height: 1.2; }
    p { margin-top: 0; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb {
      background: rgba(125,216,240,.25);
      border-radius: 2px;
    }

    /* ============================================================
       NAV
    ============================================================ */
    header { position: sticky; top: 0; z-index: 100; }
    .nav-wrap {
      background: rgba(9,9,15,.92);
      backdrop-filter: saturate(140%) blur(20px);
      border-bottom: 1px solid var(--chrome-edge);
    }
    /* Prismatic rail — controlled streak, low opacity */
    .nav-rail {
      height: 2px;
      background: var(--prism-streak);
      background-size: 200% 100%;
      opacity: .7;
      animation: railShift 8s linear infinite;
    }
    @keyframes railShift { to { background-position: 200% 0; } }

    .nav-inner {
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: .5rem;
      padding: .6rem 1rem;
    }
    .brand { display: flex; align-items: center; gap: .5rem; }
    .brand img {
      width: 36px; height: 36px;
      border-radius: 10px;
      object-fit: cover;
      filter: drop-shadow(0 0 12px rgba(125,216,240,.28));
      transition: filter .3s;
    }
    .brand img:hover { filter: drop-shadow(0 0 20px rgba(125,216,240,.35)); }
    /* ZG fallback mark — crystal Z rendered in SVG if image missing */
    .brand-zg {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: #0d0d18;
      border: 1px solid var(--chrome-edge);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display);
      font-weight: 800;
      font-size: .9rem;
      background: linear-gradient(135deg, var(--cyan-dim), var(--cyan));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 0 8px rgba(125,216,240,.32));
    }
    .brand b {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1.1rem;
      letter-spacing: .5px;
      background: linear-gradient(90deg, var(--chrome), var(--cyan));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .nav-menu { margin-left: auto; display: flex; gap: .1rem; flex-wrap: wrap; align-items: center; }
    .nav-menu a {
      padding: .36rem .6rem;
      border-radius: 8px;
      color: var(--muted);
      font-family: var(--font-display);
      font-size: .78rem;
      font-weight: 600;
      transition: color .2s, background .2s;
      white-space: nowrap;
    }
    .nav-menu a[aria-current="page"],
    .nav-menu a:hover { color: var(--txt); background: var(--glass); }

    .btn-nav-portfolio {
      background: linear-gradient(100deg, var(--cyan-dim), var(--cyan));
      color: #0a0b0f;
      border-radius: 8px;
      padding: .36rem .8rem;
      font-weight: 700;
      font-size: .78rem;
      transition: transform .12s, box-shadow .2s;
    }
    .btn-nav-portfolio:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(125,216,240,.3);
      color: #0a0b0f;
    }
    .btn-nav-arcade {
      background: linear-gradient(100deg, var(--chrome-dim), var(--chrome));
      color: #0a0b0f;
      border-radius: 8px;
      padding: .36rem .8rem;
      font-weight: 700;
      font-size: .78rem;
      transition: transform .12s, box-shadow .2s;
    }
    .btn-nav-arcade:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(196,208,228,.25);
      color: #0a0b0f;
    }

    /* ============================================================
       AD SLOT
    ============================================================ */
    .ad-slot {
      max-width: 1280px;
      margin: 0 auto;
      text-align: center;
      padding: .5rem 1rem;
    }

    /* ============================================================
       LAYOUT
    ============================================================ */
    main { max-width: 1280px; margin: 0 auto; padding: 1rem; }
    .page { margin: 1.5rem 0; }

    /* ============================================================
       HERO
    ============================================================ */
    .hero {
      position: relative;
      border-radius: var(--radius);
      overflow: hidden;
      min-height: 60vh;
      display: grid;
      place-items: center;
      text-align: center;
      border: 1px solid var(--chrome-edge);
      box-shadow: var(--shadow-lift);
    }
    .hero-bg {
      position: absolute; inset: 0;
      background: linear-gradient(135deg, #07070e 0%, #0f0f22 50%, #0a0a14 100%);
    }
    /* Crystal grid lines */
    .hero-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(200,212,232,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,212,232,.025) 1px, transparent 1px);
      background-size: 52px 52px;
      mask-image: radial-gradient(ellipse 90% 85% at 50% 55%, black 25%, transparent 75%);
    }
    /* Prismatic refraction orbs */
    .hero-orb { position: absolute; border-radius: 50%; filter: blur(80px); pointer-events: none; }
    .hero-orb-1 { width:500px; height:500px; background: radial-gradient(circle, rgba(125,216,240,.055) 0%, transparent 70%); top:-150px; left:-100px; animation: orbFloat 14s ease-in-out infinite; }
    .hero-orb-2 { width:400px; height:400px; background: radial-gradient(circle, rgba(196,208,228,.04) 0%, transparent 70%); bottom:-100px; right:-50px; animation: orbFloat 17s ease-in-out infinite reverse; }
    .hero-orb-3 { width:250px; height:250px; background: radial-gradient(circle, rgba(125,216,240,.035) 0%, transparent 70%); top:35%; left:58%; animation: orbFloat 20s ease-in-out infinite 4s; }
    @keyframes orbFloat {
      0%, 100% { transform: translate(0,0) scale(1); }
      50%       { transform: translate(24px,-24px) scale(1.06); }
    }
    .hero-content { position: relative; z-index: 1; padding: 2.5rem 1.5rem; max-width: 860px; }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      font-family: var(--font-display);
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--chrome);
      background: rgba(200,212,232,.07);
      border: 1px solid var(--chrome-edge);
      padding: .3rem .9rem;
      border-radius: 999px;
      margin-bottom: 1.1rem;
    }
    .hero h1 { font-size: clamp(2rem, 4.5vw + .5rem, 4rem); font-weight: 800; margin-bottom: 1rem; }
    /* Crystal shimmer — chrome → cyan → chrome, like light through glass */
    .hero h1 .grad {
      background: linear-gradient(95deg,
        var(--chrome)    0%,
        var(--cyan-pale) 35%,
        var(--cyan)      55%,
        var(--chrome)    80%,
        var(--cyan-pale) 100%
      );
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      background-size: 200% 100%;
      animation: shimmer 9s linear infinite;
    }
    @keyframes shimmer { to { background-position: 200% 0; } }
    .hero p { color: var(--muted); font-size: 1.05rem; max-width: 640px; margin: 0 auto 1.5rem; }
    .hero-btns { display: flex; gap: .75rem; justify-content: center; flex-wrap: wrap; }

    /* ============================================================
       BUTTONS
    ============================================================ */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: .45rem;
      padding: .72rem 1.25rem;
      border-radius: var(--radius-sm);
      font-family: var(--font-display);
      font-size: .88rem;
      font-weight: 700;
      border: 1px solid var(--glass-border);
      color: var(--txt);
      background: var(--glass);
      cursor: pointer;
      transition: transform .12s, background .2s, box-shadow .2s;
      white-space: nowrap;
      text-decoration: none;
    }
    .btn:hover { transform: translateY(-2px); background: var(--glass-hover); box-shadow: var(--shadow-lift); color: var(--txt); }

    /* Cyan — primary action */
    .btn.cyan {
      background: linear-gradient(100deg, var(--cyan-dim), var(--cyan));
      border-color: transparent;
      color: #0a0b0f;
      box-shadow: 0 4px 20px rgba(125,216,240,.2);
    }
    .btn.cyan:hover { box-shadow: 0 8px 30px rgba(125,216,240,.35); color: #0a0b0f; }

    /* Chrome — secondary action */
    .btn.chrome {
      background: linear-gradient(135deg, rgba(196,208,228,.14), rgba(196,208,228,.07));
      border-color: rgba(196,208,228,.2);
      color: var(--chrome);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
    }
    .btn.chrome:hover { box-shadow: 0 6px 24px rgba(196,208,228,.16), inset 0 1px 0 rgba(255,255,255,.08); color: #fff; }

    /* Crystal — glass with cyan edge */
    .btn.crystal {
      background: rgba(125,216,240,.08);
      border-color: var(--cyan-edge);
      color: var(--cyan);
    }
    .btn.crystal:hover { background: rgba(125,216,240,.14); box-shadow: var(--shadow-cyan); color: var(--cyan-pale); }

    /* DEPRECATED prism aliases — kept as chrome/cyan fallbacks so old template refs don't break */
    .btn.prism-b { background: linear-gradient(100deg,var(--cyan-dim),var(--cyan)); border-color:transparent; color:#0a0b0f; box-shadow:0 4px 20px rgba(125,216,240,.2); }
    .btn.prism-b:hover { box-shadow:0 8px 30px rgba(125,216,240,.35); color:#0a0b0f; }
    .btn.prism-y { background:linear-gradient(135deg,rgba(196,208,228,.14),rgba(196,208,228,.07)); border-color:rgba(196,208,228,.2); color:var(--chrome); }
    .btn.prism-y:hover { box-shadow:0 6px 24px rgba(196,208,228,.16); color:#fff; }
    .btn.prism-g { background:rgba(125,216,240,.08); border-color:var(--cyan-edge); color:var(--cyan); }
    .btn.prism-g:hover { background:rgba(125,216,240,.14); color:var(--cyan-pale); }
    .btn.prism-v { background:linear-gradient(135deg,rgba(196,208,228,.14),rgba(196,208,228,.07)); border-color:rgba(196,208,228,.2); color:var(--chrome); }
    .btn.prism-v:hover { box-shadow:0 6px 24px rgba(196,208,228,.16); color:#fff; }
    .btn.prism-r { background:linear-gradient(100deg,var(--cyan-dim),var(--cyan)); border-color:transparent; color:#0a0b0f; }
    .btn.prism-r:hover { box-shadow:0 8px 30px rgba(125,216,240,.35); color:#0a0b0f; }

    .btn.ghost { background: transparent; color: var(--muted); }
    .btn.ghost:hover { color: var(--txt); background: var(--glass); }

    /* ============================================================
       SECTIONS
    ============================================================ */
    .section { margin: 2.25rem 0; }
    .section-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.25rem; }
    .section-header h2 { margin: 0; font-size: clamp(1.2rem,2vw,1.6rem); font-weight: 800; white-space: nowrap; }
    /* Cyan crystal rule under section headers */
    .section-header h2::after {
      content: '';
      display: block;
      height: 1px;
      width: 2.5rem;
      margin-top: .3rem;
      background: linear-gradient(90deg, var(--cyan), transparent);
      border-radius: 1px;
    }
    .section-header .line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--chrome-edge), transparent);
      min-width: 20px;
    }

    /* ============================================================
       CARDS — glass morphism with chrome edges
    ============================================================ */
    .card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 1.35rem;
      box-shadow: var(--shadow);
      transition: box-shadow .25s, border-color .25s, transform .15s;
    }
    .card:hover { box-shadow: var(--shadow-lift); }
    .card.b-cyan:hover   { border-color: var(--cyan-edge); }
    .card.b-chrome:hover { border-color: rgba(196,208,228,.18); }

    /* ============================================================
       STATS
    ============================================================ */
    .stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: .75rem; }
    .stat-box {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      padding: 1rem;
      text-align: center;
      box-shadow: var(--shadow);
      transition: transform .15s, border-color .2s;
      position: relative;
      overflow: hidden;
    }
    .stat-box::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 1px;
      background: var(--prism-streak);
      opacity: .3;
    }
    .stat-box:hover { transform: translateY(-2px); border-color: var(--chrome-edge); }
    .stat-num {
      font-family: var(--font-display);
      font-size: 1.7rem;
      font-weight: 800;
      background: linear-gradient(90deg, var(--chrome), var(--cyan));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .stat-label { font-size: .74rem; color: var(--muted); font-family: var(--font-display); margin-top: .2rem; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; }

    /* ============================================================
       LINK GRID
    ============================================================ */
    .link-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: .85rem; }
    .link-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 1.35rem 1.1rem;
      display: flex;
      flex-direction: column;
      gap: .5rem;
      cursor: pointer;
      transition: transform .18s, box-shadow .2s, border-color .2s;
      text-decoration: none;
      color: var(--txt);
      position: relative;
      overflow: hidden;
    }
    /* Prismatic top-edge shimmer on hover */
    .link-card::before {
      content: '';
      position: absolute; top: 0; left: -100%; right: 0;
      height: 1px;
      background: var(--rainbow);
      opacity: 0;
      transition: opacity .3s, left .4s;
    }
    .link-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-lift); color: var(--txt); }
    .link-card:hover::before { opacity: .7; left: 0; }
    .link-card.b-cy:hover { border-color: var(--cyan-edge); }
    .link-card .lc-icon   { font-size: 1.8rem; }
    .link-card .lc-label  { font-size: .62rem; font-family: var(--font-display); font-weight: 800; letter-spacing: .18em; text-transform: uppercase; color: var(--muted); }
    .link-card h3         { font-family: var(--font-display); font-size: 1rem; font-weight: 800; margin: 0; }
    .link-card p          { color: var(--muted); font-size: .82rem; line-height: 1.5; margin: 0; flex: 1; }
    .link-card .lc-arrow  { font-size: .82rem; color: var(--muted2); transition: color .2s; margin-top: auto; }
    .link-card:hover .lc-arrow { color: var(--cyan); }

    /* ============================================================
       FEATURE CARDS — Metaversery, Arcade, LeadSeer
    ============================================================ */
    .feature-card {
      border-radius: var(--radius);
      padding: 1.75rem 1.5rem;
      position: relative;
      overflow: hidden;
    }
    .feature-card::after {
      content: '';
      position: absolute; inset: 0;
      border-radius: var(--radius);
      padding: 1px;
      background: var(--rainbow);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: destination-out;
      mask-composite: exclude;
      opacity: .25;
      pointer-events: none;
    }

    .fc-arcade {
      background: linear-gradient(135deg, rgba(196,208,228,.05), rgba(125,216,240,.04), rgba(196,208,228,.02));
      border: 1px solid rgba(125,216,240,.18);
      box-shadow: 0 8px 40px rgba(125,216,240,.06);
    }
    .fc-arcade::before { content:"🕹️"; position:absolute; right:1.5rem; top:50%; transform:translateY(-50%); font-size:6rem; opacity:.07; pointer-events:none; }

    .fc-meta {
      background: linear-gradient(135deg, rgba(125,216,240,.07), rgba(125,216,240,.05), rgba(196,208,228,.03));
      border: 1px solid rgba(125,216,240,.18);
      box-shadow: 0 8px 40px rgba(125,216,240,.06);
    }
    .fc-meta::before { content:"🌐"; position:absolute; right:1.5rem; top:50%; transform:translateY(-50%); font-size:6rem; opacity:.07; pointer-events:none; }

    .fc-lead {
      background: linear-gradient(135deg, rgba(125,216,240,.07), rgba(125,216,240,.05), rgba(196,208,228,.03));
      border: 1px solid rgba(125,216,240,.18);
      box-shadow: 0 8px 40px rgba(125,216,240,.06);
    }
    .fc-lead::before { content:"🎯"; position:absolute; right:1.5rem; top:50%; transform:translateY(-50%); font-size:6rem; opacity:.07; pointer-events:none; }

    .fc-badge {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      font-family: var(--font-display);
      font-size: .66rem;
      font-weight: 800;
      letter-spacing: .16em;
      text-transform: uppercase;
      padding: .24rem .75rem;
      border-radius: 999px;
      margin-bottom: .85rem;
    }
    .fc-badge.cy { background: rgba(125,216,240,.10); border: 1px solid rgba(125,216,240,.25); color: var(--cyan); }
    .fc-badge.ch { background: rgba(196,208,228,.08); border: 1px solid rgba(196,208,228,.20); color: var(--chrome); }

    .feature-card h3 { font-family: var(--font-display); font-size: clamp(1.3rem,2.5vw,2rem); font-weight: 800; margin-bottom: .5rem; }
    .feature-card p  { color: var(--muted); font-size: .92rem; max-width: 640px; }
    .meta-features   { display: flex; gap: .5rem; flex-wrap: wrap; margin-top: .85rem; }
    .meta-feat {
      border-radius: 9px;
      padding: .4rem .8rem;
      font-size: .8rem;
      background: rgba(125,216,240,.07);
      border: 1px solid rgba(125,216,240,.15);
    }
    .meta-feat::before { content: "✦ "; color: var(--cyan); font-weight: 800; }

    /* ============================================================
       TILES
    ============================================================ */
    .tiles { display: grid; grid-template-columns: repeat(4,1fr); gap: .9rem; }
    .tile {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: transform .18s, box-shadow .2s, border-color .2s;
    }
    .tile:hover { transform: translateY(-5px); box-shadow: var(--shadow-lift); border-color: var(--chrome-edge); }
    .tile .thumb {
      height: 150px;
      background: #0d0d18 center/contain no-repeat;
      background-color: #0a0a14;
      position: relative;
    }
    .tile .thumb::after {
      content: "";
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(9,9,15,.85), transparent 60%);
    }
    .tile .tbody { padding: .9rem; }
    .tile h3 { font-family: var(--font-display); font-size: .9rem; font-weight: 700; margin-bottom: .3rem; }
    .tile p   { color: var(--muted); font-size: .8rem; line-height: 1.5; }

    /* ============================================================
       GRIDS
    ============================================================ */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: .9rem; }

    /* ============================================================
       MANIFESTO / PULL QUOTE
    ============================================================ */
    .manifesto-pull {
      font-size: clamp(1.15rem, 2vw, 1.6rem);
      font-style: italic;
      font-family: var(--font-display);
      color: var(--txt);
      border-left: 2px solid var(--chrome);
      padding-left: 1.2rem;
      margin: 1.35rem 0;
      line-height: 1.45;
    }
    .manifesto-pull.b { border-color: var(--cyan); }
    .manifesto-pull.g { border-color: var(--cyan); }
    .manifesto-pull.v { border-color: var(--chrome); }

    /* ============================================================
       ICP LIST
    ============================================================ */
    .icp-list { list-style: none; padding: 0; display: flex; flex-direction: column; gap: .5rem; }
    .icp-list li { display: flex; align-items: flex-start; gap: .7rem; font-size: .9rem; }
    .icp-list li::before { content: "→"; color: var(--cyan); font-weight: 700; flex-shrink: 0; }

    /* ============================================================
       TAGS / CHIPS
    ============================================================ */
    .tags { display: flex; gap: .4rem; flex-wrap: wrap; justify-content: center; margin: .75rem 0; }
    .tag {
      font-size: .72rem;
      background: rgba(200,212,232,.07);
      border: 1px solid var(--chrome-edge);
      color: var(--chrome);
      padding: .16rem .55rem;
      border-radius: 999px;
      font-family: var(--font-display);
      font-weight: 600;
    }
    .chip {
      display: inline-block;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      padding: .3rem .7rem;
      border-radius: 999px;
      color: var(--chrome-mid);
      font-family: var(--font-display);
      font-size: .8rem;
      font-weight: 600;
      transition: background .2s, color .2s;
    }
    .chip:hover { background: rgba(200,212,232,.1); color: var(--chrome); }

    /* ============================================================
       PORTAL TABS
    ============================================================ */
    .portal-tabs { display: flex; gap: .45rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .portal-tab {
      display: flex;
      align-items: center;
      gap: .4rem;
      padding: .48rem .95rem;
      border-radius: 999px;
      font-family: var(--font-display);
      font-size: .78rem;
      font-weight: 700;
      border: 1px solid var(--glass-border);
      background: var(--glass);
      color: var(--muted);
      cursor: pointer;
      transition: all .2s;
    }
    .portal-tab:hover { color: var(--txt); background: var(--glass-hover); }
    .portal-tab.active {
      color: var(--chrome);
      background: rgba(200,212,232,.08);
      border-color: var(--chrome-edge);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
    }
    .portal-tab .tab-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 20px; height: 20px;
      padding: 0 5px;
      background: rgba(255,255,255,.08);
      border-radius: 999px;
      font-size: .68rem;
      font-weight: 800;
    }
    .portal-panel { display: none; animation: fadeUp .3s ease; }
    .portal-panel.visible { display: block; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

    .portal-banner {
      border-radius: var(--radius);
      padding: 1.4rem 1.5rem;
      margin-bottom: 1.25rem;
      border: 1px solid var(--glass-border);
      position: relative;
      overflow: hidden;
    }
    .portal-banner::before { content: attr(data-icon); position:absolute; right:1.5rem; top:50%; transform:translateY(-50%); font-size:5rem; opacity:.07; pointer-events:none; }
    .portal-banner::after {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 1px;
      background: var(--rainbow);
      opacity: .3;
    }
    .portal-banner.blue   { background: linear-gradient(135deg,rgba(125,216,240,.08),transparent); border-color: rgba(125,216,240,.15); }
    .portal-banner.red    { background: linear-gradient(135deg,rgba(125,216,240,.07),transparent); border-color: rgba(196,208,228,.12); }
    .portal-banner.green  { background: linear-gradient(135deg,rgba(125,216,240,.08),transparent);  border-color: rgba(125,216,240,.15); }
    .portal-banner.gold   { background: linear-gradient(135deg,rgba(125,216,240,.07),transparent); border-color: rgba(125,216,240,.14); }
    .portal-banner.violet { background: linear-gradient(135deg,rgba(125,216,240,.07),transparent); border-color: rgba(125,216,240,.14); }
    .portal-banner h3 { font-family: var(--font-display); font-size: clamp(1.1rem,2vw,1.5rem); font-weight: 800; margin-bottom: .4rem; }
    .portal-banner p  { color: var(--muted); font-size: .88rem; margin: 0; max-width: 580px; }

    .service-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: .75rem; }
    .svc-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      padding: 1rem 1.1rem;
      transition: transform .15s, border-color .2s, background .2s;
    }
    .svc-card:hover { transform: translateY(-3px); background: var(--glass-hover); }
    .svc-card.h-b:hover { border-color: rgba(125,216,240,.22); }
    .svc-card.h-r:hover { border-color: rgba(196,208,228,.22); }
    .svc-card.h-g:hover { border-color: rgba(125,216,240,.22); }
    .svc-card.h-y:hover { border-color: rgba(125,216,240,.20); }
    .svc-card.h-v:hover { border-color: rgba(125,216,240,.20); }
    .svc-title { font-family: var(--font-display); font-size: .88rem; font-weight: 700; margin-bottom: .35rem; display: flex; align-items: flex-start; gap: .5rem; }
    .svc-icon  { font-size: 1.1rem; flex-shrink: 0; }
    .svc-meta  { font-size: .75rem; color: var(--muted); line-height: 1.5; }
    .svc-badge {
      display: inline-block; font-size: .62rem;
      font-family: var(--font-display); font-weight: 800;
      padding: .08rem .42rem; border-radius: 999px;
      margin-top: .4rem; text-transform: uppercase; letter-spacing: .08em;
    }
    .bd-b { background: rgba(125,216,240,.12); color: var(--cyan); }
    .bd-g { background: rgba(125,216,240,.12);  color: var(--cyan); }
    .bd-y { background: rgba(125,216,240,.12); color: var(--cyan); }
    .bd-v { background: rgba(125,216,240,.12); color: var(--chrome); }
    .bd-hot { background: linear-gradient(90deg,var(--cyan),var(--cyan-dim)); color:#fff; }

    /* ============================================================
       TIERS
    ============================================================ */
    .tiers-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: .8rem; margin-top: 1rem; }
    .tier-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 1.25rem 1rem;
      text-align: center;
      transition: transform .15s, box-shadow .2s;
      position: relative;
      overflow: hidden;
    }
    .tier-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 1px;
      background: var(--rainbow);
      opacity: 0;
      transition: opacity .3s;
    }
    .tier-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lift); }
    .tier-card:hover::before { opacity: .5; }
    .tier-card.featured { border-color: var(--chrome-edge); background: rgba(200,212,232,.05); }
    .tier-name  { font-family: var(--font-display); font-weight: 800; font-size: 1rem; margin-bottom: .3rem; }
    .tier-price { font-family: var(--font-display); font-size: 1.5rem; font-weight: 800; margin: .4rem 0; }
    .tier-desc  { color: var(--muted); font-size: .76rem; line-height: 1.5; }
    .tier-card ul { list-style: none; text-align: left; margin: .75rem 0 0; padding: 0; font-size: .76rem; color: var(--muted); display: flex; flex-direction: column; gap: .35rem; }
    .tier-card ul li::before { content: "✓ "; color: var(--cyan); font-weight: 800; }

    /* ============================================================
       SEARCH
    ============================================================ */
    .search-wrap { position: relative; margin-bottom: 1.25rem; }
    .search-wrap input {
      width: 100%;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      padding: .75rem 1rem .75rem 2.75rem;
      color: var(--txt);
      font-family: var(--font-body);
      font-size: .9rem;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }
    .search-wrap input:focus { border-color: rgba(125,216,240,.28); box-shadow: 0 0 0 3px rgba(125,216,240,.07); }
    .search-wrap input::placeholder { color: var(--muted2); }
    .search-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }

    /* ============================================================
       PORTAL ITEM LIST
    ============================================================ */
    .portal-list { display: grid; grid-template-columns: 1fr 1fr; gap: .85rem; }
    .portal-item {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 1.35rem;
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      transition: transform .15s, border-color .2s, box-shadow .2s;
      text-decoration: none;
      color: var(--txt);
    }
    .portal-item:hover { transform: translateY(-3px); box-shadow: var(--shadow-lift); color: var(--txt); }
    .portal-item.i-b:hover  { border-color: rgba(125,216,240,.28); }
    .portal-item.i-y:hover  { border-color: rgba(125,216,240,.28); }
    .portal-item.i-r:hover  { border-color: rgba(196,208,228,.18); }
    .portal-item.i-g:hover  { border-color: rgba(125,216,240,.22); }
    .portal-item.i-v:hover  { border-color: rgba(125,216,240,.25); }
    .portal-item-icon { font-size: 2.2rem; flex-shrink: 0; }
    .portal-item-body h3 { font-family: var(--font-display); font-size: 1rem; font-weight: 800; margin-bottom: .3rem; }
    .portal-item-body p  { color: var(--muted); font-size: .82rem; line-height: 1.5; margin: 0; }
    .portal-item-badge {
      font-size: .62rem; font-family: var(--font-display); font-weight: 800;
      letter-spacing: .1em; text-transform: uppercase;
      padding: .16rem .55rem; border-radius: 999px;
      margin-top: .45rem; display: inline-block;
    }

    /* ============================================================
       PORTFOLIO GRID
    ============================================================ */
    .portfolio-filters {
      display: flex; gap: .4rem; flex-wrap: wrap; margin-bottom: 1.25rem;
    }
    .pf-filter {
      padding: .38rem .8rem;
      border-radius: 999px;
      font-family: var(--font-display);
      font-size: .74rem;
      font-weight: 700;
      border: 1px solid var(--glass-border);
      background: var(--glass);
      color: var(--muted);
      cursor: pointer;
      transition: all .2s;
    }
    .pf-filter:hover { color: var(--txt); background: var(--glass-hover); }
    .pf-filter.active {
      background: rgba(200,212,232,.1);
      border-color: var(--chrome-edge);
      color: var(--chrome);
    }
    .portfolio-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: .8rem; }
    .pf-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      padding: 1rem 1.1rem;
      transition: transform .15s, border-color .2s, background .2s;
      cursor: default;
    }
    .pf-card:hover { transform: translateY(-3px); background: var(--glass-hover); }
    .pf-card[data-link]:hover { cursor: pointer; }
    .pf-card.zengine:hover  { border-color: rgba(125,216,240,.20); }
    .pf-card.sympolar:hover { border-color: rgba(125,216,240,.18); }
    .pf-header { display: flex; align-items: flex-start; justify-content: space-between; gap: .5rem; margin-bottom: .4rem; }
    .pf-title { font-family: var(--font-display); font-size: .88rem; font-weight: 800; }
    .pf-status {
      font-size: .58rem; font-family: var(--font-display); font-weight: 800;
      letter-spacing: .1em; text-transform: uppercase;
      padding: .1rem .45rem; border-radius: 999px; flex-shrink: 0;
    }
    .st-shipped  { background: rgba(125,216,240,.12);  color: var(--cyan);  border: 1px solid rgba(125,216,240,.22); }
    .st-inprog   { background: rgba(125,216,240,.12); color: var(--cyan);  border: 1px solid rgba(125,216,240,.22); }
    .st-concept  { background: rgba(200,212,232,.07); color: var(--chrome-mid); border: 1px solid var(--chrome-edge); }
    .pf-desc { font-size: .76rem; color: var(--muted); line-height: 1.5; margin-bottom: .5rem; }
    .pf-tags { display: flex; gap: .3rem; flex-wrap: wrap; }
    .pf-tag {
      font-size: .6rem; padding: .1rem .4rem; border-radius: 999px;
      font-family: var(--font-display); font-weight: 700;
    }
    .pf-tag.ze { background: rgba(125,216,240,.10); color: var(--cyan); border: 1px solid rgba(125,216,240,.15); }
    .pf-tag.sy { background: rgba(125,216,240,.10);  color: var(--cyan); border: 1px solid rgba(125,216,240,.15); }
    .pf-tag.hw { background: rgba(125,216,240,.09); color: var(--cyan); border: 1px solid rgba(125,216,240,.14); }
    .pf-tag.gm { background: rgba(125,216,240,.08); color: var(--cyan); border: 1px solid rgba(196,208,228,.12); }
    .pf-tag.ai { background: rgba(125,216,240,.09); color: var(--chrome); border: 1px solid rgba(125,216,240,.14); }
    .pf-tag.cr { background: rgba(125,216,240,.09); color: var(--cyan); border: 1px solid rgba(125,216,240,.13); }
    .pf-brand-strip {
      display: flex; gap: .35rem; align-items: center;
      font-size: .62rem; font-family: var(--font-display); font-weight: 700;
      color: var(--muted2); text-transform: uppercase; letter-spacing: .1em;
      margin-bottom: .5rem;
    }
    .pf-brand-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .pf-brand-dot.ze { background: var(--cyan); }
    .pf-brand-dot.sy { background: var(--chrome-mid); }

    /* ============================================================
       CONTACT FORM
    ============================================================ */
    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block; font-family: var(--font-display); font-size: .76rem;
      font-weight: 700; color: var(--muted); margin-bottom: .4rem;
      text-transform: uppercase; letter-spacing: .1em;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%; background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm); padding: .75rem 1rem;
      color: var(--txt); font-family: var(--font-body); font-size: .9rem;
      transition: border-color .2s, box-shadow .2s; outline: none;
      -webkit-appearance: none; appearance: none;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { border-color: rgba(125,216,240,.28); box-shadow: 0 0 0 3px rgba(125,216,240,.07); }
    .form-group input::placeholder,
    .form-group textarea::placeholder { color: var(--muted2); }
    .form-group select option { background: #0d0d18; color: var(--txt); }
    .form-group textarea { resize: vertical; min-height: 120px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-success { display: none; background: rgba(125,216,240,.07); border: 1px solid rgba(125,216,240,.22); border-radius: var(--radius-sm); padding: 1.5rem; text-align: center; }
    .form-success h4 { font-family: var(--font-display); margin-bottom: .3rem; color: var(--cyan); }
    .form-success p  { color: var(--muted); font-size: .88rem; margin: 0; }

    /* ============================================================
       CTA BLOCK
    ============================================================ */
    .cta-block {
      border-radius: var(--radius);
      padding: 2.25rem 1.5rem;
      text-align: center;
      box-shadow: var(--shadow-lift);
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, rgba(125,216,240,.06), rgba(196,208,228,.04));
      border: 1px solid var(--chrome-edge);
    }
    .cta-block::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 1px;
      background: var(--rainbow);
      opacity: .4;
    }
    .cta-block h2 { font-size: clamp(1.3rem,2.5vw,2rem); margin-bottom: .75rem; }
    .cta-block p  { color: var(--muted); max-width: 520px; margin: 0 auto 1.5rem; }

    /* ============================================================
       WATERMARK
    ============================================================ */
    .zengine-watermark {
      font-family: var(--font-display);
      font-size: .66rem;
      font-weight: 700;
      color: var(--muted2);
      letter-spacing: .1em;
      text-align: center;
      padding: .4rem 0;
    }

    /* ============================================================
       FOOTER
    ============================================================ */
    footer {
      max-width: 1280px;
      margin: 2.5rem auto 1.5rem;
      padding: 1.5rem 1rem 1rem;
      border-top: 1px solid rgba(200,212,232,.06);
    }
    .footer-inner { display: flex; justify-content: space-between; align-items: center; gap: 1rem; flex-wrap: wrap; }
    .footer-links { display: flex; gap: .5rem; flex-wrap: wrap; }

    /* ============================================================
       RESPONSIVE
    ============================================================ */
    @media (max-width: 960px) {
      .link-grid      { grid-template-columns: 1fr 1fr; }
      .tiles          { grid-template-columns: repeat(2,1fr); }
      .service-grid   { grid-template-columns: 1fr 1fr; }
      .tiers-grid     { grid-template-columns: 1fr 1fr; }
      .portal-list    { grid-template-columns: 1fr; }
      .form-row       { grid-template-columns: 1fr; }
      .portfolio-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 640px) {
      main          { padding: .75rem; }
      .hero         { min-height: 50vh; border-radius: 16px; }
      .hero-content { padding: 2rem .75rem; }
      .card         { padding: 1rem; border-radius: 16px; }
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
      .stats-row    { grid-template-columns: 1fr 1fr; }
      .link-grid    { grid-template-columns: 1fr 1fr; gap: .7rem; }
      .tiles        { grid-template-columns: 1fr 1fr; gap: .7rem; }
      .service-grid { grid-template-columns: 1fr; }
      .tiers-grid   { grid-template-columns: 1fr 1fr; }

var app = document.getElementById('app');

function navigate() {
  var hash = location.hash || '#/home';
  var path = hash.slice(1);

  if (path.startsWith('/project/')) {
    renderProject({id: path.split('/')[2]});
    setActive(null);
    return;
  }

  var views = {
    '/home':      renderHome,
    '/about':     renderAbout,
    '/arcade':    renderArcade,
    '/portfolio': renderPortfolio,
    '/projects':  renderProjects,
    '/services':  renderServices,
    '/contact':   renderContact
  };

  var fn = views[path] || renderHome;
  fn();
  setActive(path);
  window.scrollTo(0, 0);
  app.focus();
}

function setActive(raw) {
  document.querySelectorAll('.nav-menu a[data-link]').forEach(function(a) {
    a.setAttribute('aria-current', a.getAttribute('href') === ('#' + raw) ? 'page' : 'false');
  });
}

// READS: tpl-portfolio template, PORTFOLIO_ITEMS
// WRITES: app.innerHTML, pfGrid innerHTML
function renderPortfolio() {
  app.innerHTML = document.getElementById('tpl-portfolio').innerHTML;

  var activeFilter = 'all';
  var grid = document.getElementById('pfGrid');
  var filters = document.getElementById('pfFilters');

  function buildGrid(filter) {
    var items = PORTFOLIO_ITEMS;
    if (filter !== 'all') {
      items = PORTFOLIO_ITEMS.filter(function(item) {
        if (filter === 'shipped') return item.status === 'shipped';
        if (filter === 'inprog')  return item.status === 'inprog';
        if (filter === 'concept') return item.status === 'concept';
        if (filter === 'sympolar') return item.brand === 'sy';
        return item.cats.indexOf(filter) !== -1;
      });
    }
    var html = '';
    for (var i = 0; i < items.length; i++) {
      var item = items[i];
      var stClass = item.status === 'shipped' ? 'st-shipped' : (item.status === 'inprog' ? 'st-inprog' : 'st-concept');
      var stLabel = item.status === 'shipped' ? 'Shipped' : (item.status === 'inprog' ? 'In Progress' : 'Concept');
      var brandClass = item.brand === 'ze' ? 'zengine' : 'sympolar';
      var isLink = item.link ? 'data-link="' + escH(item.link) + '"' : '';
      html += '<div class="pf-card ' + brandClass + '" ' + isLink + '>';
      html += '<div class="pf-brand-strip"><span class="pf-brand-dot ' + item.brand + '"></span>';
      html += item.brand === 'ze' ? 'Zengine' : 'SymPolar';
      html += '</div>';
      html += '<div class="pf-header"><div class="pf-title">' + escH(item.title) + '</div>';
      html += '<span class="pf-status ' + stClass + '">' + stLabel + '</span></div>';
      html += '<div class="pf-desc">' + escH(item.desc) + '</div>';
      html += '<div class="pf-tags">';
      for (var t = 0; t < item.tags.length; t++) {
        var tClass = item.tags[t];
        html += '<span class="pf-tag ' + tClass + '">' + tagLabel(tClass) + '</span>';
      }
      html += '</div></div>';
    }
    grid.innerHTML = html || '<p style="color:var(--muted);padding:2rem 0">No projects in this category yet.</p>';
    // Wire clickable cards
    grid.querySelectorAll('.pf-card[data-link]').forEach(function(card) {
      card.style.cursor = 'pointer';
      card.addEventListener('click', function() {
        var dest = card.getAttribute('data-link');
        if (dest.charAt(0) === '#') {
          location.hash = dest;
        } else {
          var win = window.open(dest, '_blank', 'noopener,noreferrer');
          if (win) win.opener = null;
        }
      });
    });
  }

  buildGrid('all');

  filters.addEventListener('click', function(e) {
    var btn = e.target.closest('.pf-filter');
    if (!btn) return;
    var f = btn.dataset.filter;
    if (f === activeFilter) return;
    activeFilter = f;
    filters.querySelectorAll('.pf-filter').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    buildGrid(f);
  });
}

// Map short tag codes to readable labels
// READS: code string
// WRITES: (returns string)
function tagLabel(code) {
  var map = {ze:'Zengine',sy:'SymPolar',hw:'Hardware',gm:'Game',ai:'AI',cr:'Creative'};
  return map[code] || code;
}

// READS: tpl-projects template, PROJECTS, PROJECT_GRID_IDS

function renderProjects() {

// READS: tpl-project template, PROJECTS[id]
// WRITES: app.innerHTML, multiple child elements
function renderProject(opts) {
  var p = PROJECTS[opts.id];
  if (!p) {
    app.innerHTML = '<section class="page card"><p>Project not found. <a href="#/projects" class="btn cyan" style="display:inline-flex;margin-top:.75rem">← All Projects</a></p></section>';
    return;
  }
  app.innerHTML = document.getElementById('tpl-project').innerHTML;

  var bgBlur = document.getElementById('projBgBlur');
  if (bgBlur) bgBlur.style.backgroundImage = 'url(\'' + p.hero + '\')';

  var logo = document.getElementById('projLogo');
  if (logo) { logo.src = p.logo; logo.alt = p.title + ' logo'; }

  var titleEl = document.getElementById('projTitle');
  if (titleEl) titleEl.textContent = p.title;

  var descEl = document.getElementById('projDesc');
  if (descEl) descEl.textContent = p.desc;

  var tagsEl = document.getElementById('projTags');
  if (tagsEl) {
    var tagHtml = '';
    var tags = p.tags || [];
    for (var i = 0; i < tags.length; i++) {
      tagHtml += '<span class="tag">' + escH(tags[i]) + '</span>';
    }
    tagsEl.innerHTML = tagHtml;
  }

  var linksEl = document.getElementById('projLinks');
  if (linksEl) {
    var linkHtml = '';
    var links = p.links || [];
    for (var j = 0; j < links.length; j++) {
      linkHtml += '<a class="btn cyan" href="' + escH(links[j].href) + '">' + escH(links[j].label) + ' →</a>';
    }
    linksEl.innerHTML = linkHtml;
  }

  var bodyEl = document.getElementById('projBody');
  if (bodyEl) bodyEl.innerHTML = p.body || '';
}

// READS: tpl-services template, PORTALS_DATA
// WRITES: app.innerHTML, portal tabs, panels, search
function renderServices() {
  app.innerHTML = document.getElementById('tpl-services').innerHTML;

  var tabsEl    = document.getElementById('portalTabs');
  var panelsEl  = document.getElementById('portalPanels');
  var activePortal = PORTALS_DATA[0].id;

  var tabHtml = '';
  for (var i = 0; i < PORTALS_DATA.length; i++) {
    var p = PORTALS_DATA[i];
    tabHtml += '<button class="portal-tab' + (i === 0 ? ' active' : '') + '" data-portal="' + p.id + '" aria-pressed="' + (i === 0) + '">';
    tabHtml += '<span>' + p.icon + '</span> ' + p.label + ' <span class="tab-count">' + p.services.length + '</span></button>';
  }
  tabsEl.innerHTML = tabHtml;

  var panelHtml = '';
  for (var pi = 0; pi < PORTALS_DATA.length; pi++) {
    var portal = PORTALS_DATA[pi];
    panelHtml += '<div class="portal-panel' + (pi === 0 ? ' visible' : '') + '" id="panel-' + portal.id + '">';
    panelHtml += '<div class="portal-banner ' + portal.bannerClass + '" data-icon="' + portal.icon + '">';
    panelHtml += '<h3>' + portal.icon + ' ' + portal.label + '</h3><p>' + portal.desc + '</p></div>';
    panelHtml += '<div class="service-grid">';
    for (var si = 0; si < portal.services.length; si++) {
      var svc = portal.services[si];
      panelHtml += '<div class="svc-card ' + portal.hoverClass + '">';
      panelHtml += '<div class="svc-title"><span class="svc-icon">' + svc.icon + '</span>' + escH(svc.title) + '</div>';
      panelHtml += '<div class="svc-meta">' + escH(svc.meta) + '</div>';
      if (svc.badge) panelHtml += '<span class="svc-badge ' + (svc.badgeClass || portal.badgeClass) + '">' + svc.badge + '</span>';
      panelHtml += '</div>';
    }
    panelHtml += '</div></div>';
  }
  panelsEl.innerHTML = panelHtml;

  tabsEl.addEventListener('click', function(e) {
    var btn = e.target.closest('.portal-tab');
    if (!btn) return;
    var id = btn.dataset.portal;
    if (id === activePortal) return;
    activePortal = id;
    tabsEl.querySelectorAll('.portal-tab').forEach(function(t) { t.classList.remove('active'); t.setAttribute('aria-pressed','false'); });
    btn.classList.add('active'); btn.setAttribute('aria-pressed','true');
    panelsEl.querySelectorAll('.portal-panel').forEach(function(panel) { panel.classList.remove('visible'); });
    var target = document.getElementById('panel-' + id);
    if (target) target.classList.add('visible');
  });

  var searchInput   = document.getElementById('svcSearch');
  var searchResults = document.getElementById('searchResults');

  searchInput.addEventListener('input', function() {
    var q = searchInput.value.trim().toLowerCase();
    if (!q) {
      searchResults.style.display = 'none';
      tabsEl.style.display = '';
      panelsEl.style.display = '';
      return;
    }
    tabsEl.style.display   = 'none';
    panelsEl.style.display  = 'none';
    searchResults.style.display = '';

    var matches = [];
    for (var pi = 0; pi < PORTALS_DATA.length; pi++) {
      var portal = PORTALS_DATA[pi];
      for (var si = 0; si < portal.services.length; si++) {
        var svc = portal.services[si];
        if (svc.title.toLowerCase().indexOf(q) !== -1 || svc.meta.toLowerCase().indexOf(q) !== -1) {
          matches.push({portal: portal, svc: svc});
        }
      }
    }

    if (!matches.length) {
      searchResults.innerHTML = '<div class="card" style="text-align:center;padding:2rem"><p style="color:var(--muted)">No services found for "<strong>' + escH(q) + '</strong>"</p><a class="btn cyan" href="#/contact">Request a Custom Service →</a></div>';
    } else {
      var rHtml = '<p style="color:var(--muted);font-size:.84rem;margin-bottom:.85rem">' + matches.length + ' result' + (matches.length !== 1 ? 's' : '') + ' for "<strong style=\'color:var(--txt)\'>' + escH(q) + '</strong>"</p><div class="service-grid">';
      for (var mi = 0; mi < matches.length; mi++) {
        var m = matches[mi];
        rHtml += '<div class="svc-card ' + m.portal.hoverClass + '">';
        rHtml += '<div style="font-size:.66rem;color:var(--muted);font-family:var(--font-display);font-weight:700;margin-bottom:.3rem;text-transform:uppercase;letter-spacing:.08em">' + m.portal.icon + ' ' + m.portal.label + '</div>';
        rHtml += '<div class="svc-title"><span class="svc-icon">' + m.svc.icon + '</span>' + escH(m.svc.title) + '</div>';
        rHtml += '<div class="svc-meta">' + escH(m.svc.meta) + '</div></div>';
      }
      rHtml += '</div>';
      searchResults.innerHTML = rHtml;
    }
  });
}

// READS: tpl-contact template
// WRITES: app.innerHTML, contact form state
// DEPENDS ON: escH
function renderContact() {
  app.innerHTML = document.getElementById('tpl-contact').innerHTML;

  var submit   = document.getElementById('cf-submit');
  var errEl    = document.getElementById('cf-error');
  var formWrap = document.getElementById('contactFormWrap');
  var success  = document.getElementById('contactSuccess');

  if (!submit) return;

  // DECISION: Contact form is client-side only — no backend wired.
  // Shows success UI on valid submission but does NOT transmit data.
  // Wire to GAS or mailto backend in next iteration.
  submit.addEventListener('click', function() {
    var name    = document.getElementById('cf-name').value.trim();
    var email   = document.getElementById('cf-email').value.trim();
    var service = document.getElementById('cf-service').value;
    var msg     = document.getElementById('cf-message').value.trim();

    if (!name || !email || !service || !msg) {
      errEl.textContent = 'Please fill in all required fields before submitting.';
      errEl.style.display = 'block';
      return;
    }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      errEl.textContent = 'Please enter a valid email address.';
      errEl.style.display = 'block';
      return;
    }
    errEl.style.display  = 'none';
    formWrap.style.display = 'none';
    success.style.display  = 'block';
  });
}

// ─── UTILITIES ───────────────────────────────────────────────

// Escape HTML entities — prevents XSS in dynamic innerHTML
// READS: s (string)
// WRITES: (returns escaped string)
function escH(s) {
  var map = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'};
  return String(s || '').replace(/[&<>"']/g, function(c) { return map[c]; });
}

// Konami code easter egg — prismatic flash
(function() {
  var seq = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];
  var buf = [];
  window.addEventListener('keydown', function(e) {
    buf.push(e.key);
    buf.splice(-(seq.length) - 1, buf.length - seq.length);
    var match = true;
    for (var i = 0; i < seq.length; i++) {
      if (!buf[i] || buf[i].toLowerCase() !== seq[i].toLowerCase()) { match = false; break; }
    }
    if (match) {
      document.body.style.transition = 'filter .4s';
      document.body.style.filter = 'hue-rotate(180deg) saturate(200%) brightness(1.1)';
      setTimeout(function() { document.body.style.filter = ''; }, 2000);
    }
  });
})();
