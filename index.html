<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8826956454892311"
     crossorigin="anonymous"></script>
  <meta charset="utf-8" />
  <title>Zengine — Digital Architect · Services Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Zengine — Digital Architect. 109+ services spanning web development, AI, game design, application architecture, and prompt engineering. Your idea deserves an architect." />
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><defs><linearGradient id='g' x1='0' x2='1'><stop stop-color='%2387ceeb'/><stop offset='1' stop-color='%23ff7f6e'/></linearGradient></defs><rect rx='12' width='64' height='64' fill='%23071828'/><path d='M12 44V20h12v16h18v8H12z' fill='url(%23g)'/><circle cx='46' cy='24' r='7' fill='url(%23g)'/></svg>" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap');
    :root {
      --bg:#060f1a;--bg-2:#081525;--txt:#eef4ff;--muted:#7a9dbf;--muted2:#4a6a85;
      --sky:#87ceeb;--coral:#ff7f6e;--peach:#ffb38a;--orange:#ff8c42;--mint:#6de8c8;
      --gold:#f5c842;--violet:#a78bfa;
      --glass:rgba(255,255,255,.042);--glass-border:rgba(255,255,255,.085);--glass-hover:rgba(255,255,255,.075);
      --radius:20px;--radius-sm:13px;
      --shadow:0 8px 32px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.05);
      --shadow-lift:0 20px 60px rgba(0,0,0,.6),0 4px 16px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.07);
      --font-display:'Syne','Georgia',serif;--font-body:'DM Sans','Georgia',ui-serif,serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{color:var(--txt);line-height:1.65;font-family:var(--font-body);font-size:15px;
      background:radial-gradient(ellipse 1400px 700px at -5% -5%,rgba(135,206,235,.09) 0%,transparent 55%),
        radial-gradient(ellipse 1000px 800px at 105% 90%,rgba(255,127,110,.08) 0%,transparent 55%),
        radial-gradient(ellipse 600px 500px at 50% 40%,rgba(109,232,200,.03) 0%,transparent 60%),
        linear-gradient(170deg,var(--bg) 0%,#091a2e 45%,var(--bg-2) 100%);
      background-attachment:fixed;min-height:100vh}
    a{color:var(--sky);text-decoration:none}
    a:focus-visible,button:focus-visible{outline:2px solid var(--coral);outline-offset:3px;border-radius:4px}
    img{max-width:100%;display:block}
    h1,h2,h3,h4{font-family:var(--font-display);line-height:1.2}
    p{margin-top:0}
    ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}
    ::-webkit-scrollbar-thumb{background:rgba(135,206,235,.2);border-radius:3px}
    /* NAV */
    header{position:sticky;top:0;z-index:100}
    .nav-wrap{background:rgba(6,15,26,.88);backdrop-filter:saturate(160%) blur(16px);border-bottom:1px solid rgba(135,206,235,.1)}
    .nav-rail{height:3px;background:linear-gradient(90deg,var(--sky) 0%,var(--mint) 20%,var(--coral) 45%,var(--peach) 65%,var(--orange) 82%,var(--sky) 100%);background-size:200% 100%;animation:railShift 8s linear infinite}
    @keyframes railShift{to{background-position:200% 0}}
    .nav-inner{max-width:1280px;margin:0 auto;display:flex;align-items:center;gap:.6rem;padding:.65rem 1rem}
    .brand{display:flex;align-items:center;gap:.55rem}
    .brand img{width:36px;height:36px;border-radius:10px;object-fit:cover;filter:drop-shadow(0 0 10px rgba(135,206,235,.4));transition:filter .3s}
    .brand img:hover{filter:drop-shadow(0 0 18px rgba(255,127,110,.55))}
    .brand b{font-family:var(--font-display);font-weight:800;font-size:1.1rem;letter-spacing:.5px}
    .nav-menu{margin-left:auto;display:flex;gap:.1rem;flex-wrap:wrap;align-items:center}
    .nav-menu a{padding:.38rem .6rem;border-radius:9px;color:var(--muted);font-family:var(--font-display);font-size:.79rem;font-weight:600;transition:color .2s,background .2s;white-space:nowrap}
    .nav-menu a[aria-current="page"],.nav-menu a:hover{color:var(--txt);background:var(--glass)}
    .nav-menu .btn-nav{background:linear-gradient(100deg,var(--coral),var(--orange));color:#fff;border-radius:9px;padding:.38rem .8rem;font-weight:700;transition:transform .12s,box-shadow .2s}
    .nav-menu .btn-nav:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(255,127,110,.35)}
    .nav-menu .btn-nav-web{background:linear-gradient(100deg,var(--sky),var(--mint));color:#060f1a;border-radius:9px;padding:.38rem .8rem;font-weight:700;transition:transform .12s,box-shadow .2s}
    .nav-menu .btn-nav-web:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(135,206,235,.35)}
    /* LAYOUT */
    main{max-width:1280px;margin:0 auto;padding:1rem}
    .page{margin:1.5rem 0}
    /* HERO */
    .hero{position:relative;border-radius:var(--radius);overflow:hidden;min-height:58vh;display:grid;place-items:center;text-align:center;border:1px solid rgba(135,206,235,.12);box-shadow:var(--shadow-lift)}
    .hero-bg{position:absolute;inset:0;background:linear-gradient(135deg,#061220 0%,#0d2040 40%,#091828 100%)}
    .hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(135,206,235,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(135,206,235,.035) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(ellipse 85% 85% at 50% 55%,black 30%,transparent 80%)}
    .hero-orb{position:absolute;border-radius:50%;filter:blur(70px);pointer-events:none}
    .hero-orb-1{width:400px;height:400px;background:rgba(135,206,235,.07);top:-100px;left:-50px;animation:orbFloat 12s ease-in-out infinite}
    .hero-orb-2{width:350px;height:350px;background:rgba(255,127,110,.07);bottom:-80px;right:-30px;animation:orbFloat 15s ease-in-out infinite reverse}
    .hero-orb-3{width:200px;height:200px;background:rgba(109,232,200,.05);top:30%;left:60%;animation:orbFloat 18s ease-in-out infinite 3s}
    @keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(20px,-20px) scale(1.05)}}
    .hero-content{position:relative;z-index:1;padding:2.5rem 1.5rem;max-width:820px}
    .eyebrow{display:inline-flex;align-items:center;gap:.5rem;font-family:var(--font-display);font-size:.72rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--sky);background:rgba(135,206,235,.1);border:1px solid rgba(135,206,235,.22);padding:.3rem .9rem;border-radius:999px;margin-bottom:1.1rem}
    .hero h1{font-size:clamp(2rem,4vw + .5rem,3.8rem);font-weight:800;margin-bottom:1rem}
    .hero h1 .grad{background:linear-gradient(95deg,var(--sky) 0%,var(--mint) 40%,var(--coral) 80%);-webkit-background-clip:text;background-clip:text;color:transparent}
    .hero p{color:var(--muted);font-size:1.05rem;max-width:620px;margin:0 auto 1.5rem}
    .hero-btns{display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap}
    /* BUTTONS */
    .btn{display:inline-flex;align-items:center;gap:.45rem;padding:.72rem 1.25rem;border-radius:var(--radius-sm);font-family:var(--font-display);font-size:.88rem;font-weight:700;border:1px solid var(--glass-border);color:var(--txt);background:var(--glass);cursor:pointer;transition:transform .12s,background .2s,box-shadow .2s;white-space:nowrap;text-decoration:none}
    .btn:hover{transform:translateY(-2px);background:var(--glass-hover);box-shadow:var(--shadow-lift)}
    .btn.primary{background:linear-gradient(100deg,var(--coral),var(--orange));border-color:transparent;color:#fff;box-shadow:0 4px 20px rgba(255,127,110,.28)}
    .btn.primary:hover{box-shadow:0 8px 32px rgba(255,127,110,.45)}
    .btn.sky{background:linear-gradient(100deg,var(--sky),var(--mint));border-color:transparent;color:#060f1a;box-shadow:0 4px 20px rgba(135,206,235,.22)}
    .btn.sky:hover{box-shadow:0 8px 32px rgba(135,206,235,.38)}
    .btn.ghost{background:transparent;color:var(--muted)}
    .btn.ghost:hover{color:var(--txt);background:var(--glass)}
    .btn.gold{background:linear-gradient(100deg,var(--gold),var(--peach));border-color:transparent;color:#060f1a}
    .btn.gold:hover{box-shadow:0 8px 32px rgba(245,200,66,.38)}
    .btn.violet{background:linear-gradient(100deg,var(--violet),#c4b5fd);border-color:transparent;color:#060f1a}
    .btn.violet:hover{box-shadow:0 8px 32px rgba(167,139,250,.38)}
    /* SECTIONS */
    .section{margin:2.25rem 0}
    .section-header{display:flex;align-items:center;gap:1rem;margin-bottom:1.25rem}
    .section-header h2{margin:0;font-size:clamp(1.25rem,2vw,1.65rem);font-weight:800;white-space:nowrap}
    .section-header .line{flex:1;height:1px;background:linear-gradient(90deg,rgba(135,206,235,.25),transparent);min-width:20px}
    /* CARDS */
    .card{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);padding:1.35rem;box-shadow:var(--shadow);transition:box-shadow .25s,border-color .25s,transform .15s}
    .card:hover{box-shadow:var(--shadow-lift)}
    .card.coral:hover{border-color:rgba(255,127,110,.22)}
    .card.sky-hover:hover{border-color:rgba(135,206,235,.22)}
    /* STATS */
    .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem}
    .stat-box{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius-sm);padding:1rem;text-align:center;box-shadow:var(--shadow);transition:transform .15s,border-color .2s}
    .stat-box:hover{transform:translateY(-2px);border-color:rgba(135,206,235,.22)}
    .stat-num{font-family:var(--font-display);font-size:1.7rem;font-weight:800;background:linear-gradient(90deg,var(--sky),var(--mint));-webkit-background-clip:text;background-clip:text;color:transparent}
    .stat-label{font-size:.76rem;color:var(--muted);font-family:var(--font-display);margin-top:.2rem;font-weight:600;letter-spacing:.05em}
    /* LINK GRID */
    .link-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.85rem}
    .link-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);padding:1.35rem 1.1rem;display:flex;flex-direction:column;gap:.5rem;cursor:pointer;transition:transform .18s,box-shadow .2s,border-color .2s;text-decoration:none;color:var(--txt)}
    .link-card:hover{transform:translateY(-5px);box-shadow:var(--shadow-lift)}
    .link-card.sky-border:hover{border-color:rgba(135,206,235,.3)}
    .link-card.coral-border:hover{border-color:rgba(255,127,110,.3)}
    .link-card.gold-border:hover{border-color:rgba(245,200,66,.3)}
    .link-card.mint-border:hover{border-color:rgba(109,232,200,.3)}
    .link-card.violet-border:hover{border-color:rgba(167,139,250,.3)}
    .link-card .lc-icon{font-size:1.8rem}
    .link-card .lc-label{font-size:.65rem;font-family:var(--font-display);font-weight:800;letter-spacing:.15em;text-transform:uppercase;color:var(--muted)}
    .link-card h3{font-family:var(--font-display);font-size:1rem;font-weight:800;margin:0}
    .link-card p{color:var(--muted);font-size:.82rem;line-height:1.5;margin:0;flex:1}
    .link-card .lc-arrow{font-size:.85rem;color:var(--muted);transition:color .2s;margin-top:auto}
    .link-card:hover .lc-arrow{color:var(--sky)}
    /* FEATURE CARDS */
    .arcade-card{background:linear-gradient(135deg,rgba(245,200,66,.08),rgba(255,127,110,.06),rgba(109,232,200,.05));border:1px solid rgba(245,200,66,.28);border-radius:var(--radius);padding:1.75rem 1.5rem;position:relative;overflow:hidden;box-shadow:0 8px 40px rgba(245,200,66,.08)}
    .arcade-card::before{content:"🕹️";position:absolute;right:1.5rem;top:50%;transform:translateY(-50%);font-size:6rem;opacity:.08;pointer-events:none}
    .arcade-card .arcade-badge{display:inline-flex;align-items:center;gap:.4rem;font-family:var(--font-display);font-size:.68rem;font-weight:800;letter-spacing:.15em;text-transform:uppercase;background:rgba(245,200,66,.15);border:1px solid rgba(245,200,66,.35);color:var(--gold);padding:.25rem .75rem;border-radius:999px;margin-bottom:.85rem}
    .arcade-card h3{font-family:var(--font-display);font-size:clamp(1.3rem,2.5vw,2rem);font-weight:800;margin-bottom:.5rem}
    .arcade-card p{color:var(--muted);font-size:.92rem;max-width:560px}
    .arcade-march{font-family:var(--font-display);font-weight:800;font-size:1rem;background:linear-gradient(90deg,var(--gold),var(--peach));-webkit-background-clip:text;background-clip:text;color:transparent}
    /* FINDLEADS CARD */
    .findleads-card{background:linear-gradient(135deg,rgba(167,139,250,.09),rgba(135,206,235,.06),rgba(109,232,200,.05));border:1px solid rgba(167,139,250,.3);border-radius:var(--radius);padding:1.75rem 1.5rem;position:relative;overflow:hidden;box-shadow:0 8px 40px rgba(167,139,250,.09)}
    .findleads-card::before{content:"🎯";position:absolute;right:1.5rem;top:50%;transform:translateY(-50%);font-size:6rem;opacity:.08;pointer-events:none}
    .findleads-badge{display:inline-flex;align-items:center;gap:.4rem;font-family:var(--font-display);font-size:.68rem;font-weight:800;letter-spacing:.15em;text-transform:uppercase;background:rgba(167,139,250,.15);border:1px solid rgba(167,139,250,.35);color:var(--violet);padding:.25rem .75rem;border-radius:999px;margin-bottom:.85rem}
    .findleads-card h3{font-family:var(--font-display);font-size:clamp(1.3rem,2.5vw,2rem);font-weight:800;margin-bottom:.5rem}
    .findleads-card p{color:var(--muted);font-size:.92rem;max-width:560px}
    /* WEB FEATURE */
    .web-feature{background:linear-gradient(135deg,rgba(135,206,235,.1),rgba(109,232,200,.06));border:1px solid rgba(135,206,235,.28);border-radius:var(--radius);padding:1.75rem 1.5rem;position:relative;overflow:hidden;box-shadow:0 8px 40px rgba(135,206,235,.08)}
    .web-feature::before{content:"🌐";position:absolute;right:1.5rem;top:50%;transform:translateY(-50%);font-size:6rem;opacity:.07;pointer-events:none}
    .web-feature .web-badge{display:inline-flex;align-items:center;gap:.4rem;font-family:var(--font-display);font-size:.68rem;font-weight:800;letter-spacing:.15em;text-transform:uppercase;background:rgba(135,206,235,.12);border:1px solid rgba(135,206,235,.3);color:var(--sky);padding:.25rem .75rem;border-radius:999px;margin-bottom:.85rem}
    .web-feature h3{font-family:var(--font-display);font-size:clamp(1.3rem,2.5vw,2rem);font-weight:800;margin-bottom:.5rem}
    .web-feature p{color:var(--muted);font-size:.92rem;max-width:560px}
    .web-features-row{display:flex;gap:.6rem;flex-wrap:wrap;margin-top:.85rem}
    .web-feat{background:rgba(135,206,235,.08);border:1px solid rgba(135,206,235,.18);border-radius:9px;padding:.45rem .85rem;font-size:.82rem}
    .web-feat::before{content:"✓ ";color:var(--mint);font-weight:800}
    /* TILES */
    .tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:.9rem}
    .tile{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:transform .18s,box-shadow .2s,border-color .2s}
    .tile:hover{transform:translateY(-5px);box-shadow:var(--shadow-lift);border-color:rgba(135,206,235,.2)}
    .tile .thumb{height:150px;background:#0d1e30 center/contain no-repeat;background-color:#0a1828;position:relative}
    .tile .thumb::after{content:"";position:absolute;inset:0;background:linear-gradient(to top,rgba(6,15,26,.8),transparent 60%)}
    .tile .tbody{padding:.9rem}
    .tile h3{font-family:var(--font-display);font-size:.92rem;font-weight:700;margin-bottom:.3rem}
    .tile p{color:var(--muted);font-size:.82rem;line-height:1.5}
    /* GRIDS */
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
    .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.9rem}
    /* MANIFESTO */
    .manifesto-pull{font-size:clamp(1.2rem,2vw,1.65rem);font-style:italic;font-family:var(--font-display);color:var(--txt);border-left:3px solid var(--coral);padding-left:1.2rem;margin:1.35rem 0;line-height:1.45}
    .manifesto-pull.sky{border-color:var(--sky)}
    /* ICP LIST */
    .icp-list{list-style:none;padding:0;display:flex;flex-direction:column;gap:.5rem}
    .icp-list li{display:flex;align-items:flex-start;gap:.7rem;font-size:.9rem}
    .icp-list li::before{content:"→";color:var(--coral);font-weight:700;flex-shrink:0}
    /* TAGS/CHIPS */
    .tags{display:flex;gap:.4rem;flex-wrap:wrap;justify-content:center;margin:.75rem 0}
    .tag{font-size:.75rem;background:rgba(135,206,235,.1);border:1px solid rgba(135,206,235,.2);color:#b8e8ff;padding:.18rem .6rem;border-radius:999px;font-family:var(--font-display);font-weight:600}
    .chip{display:inline-block;background:var(--glass);border:1px solid var(--glass-border);padding:.32rem .7rem;border-radius:999px;color:var(--txt);font-family:var(--font-display);font-size:.82rem;font-weight:600;transition:background .2s}
    .chip:hover{background:rgba(255,255,255,.1)}
    /* PORTAL TABS */
    .portal-tabs{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.5rem}
    .portal-tab{display:flex;align-items:center;gap:.4rem;padding:.5rem .95rem;border-radius:999px;font-family:var(--font-display);font-size:.8rem;font-weight:700;border:1px solid var(--glass-border);background:var(--glass);color:var(--muted);cursor:pointer;transition:all .2s}
    .portal-tab:hover{color:var(--txt);background:var(--glass-hover)}
    .portal-tab.active{color:var(--txt);background:rgba(135,206,235,.12);border-color:rgba(135,206,235,.35)}
    .portal-tab .tab-count{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;padding:0 5px;background:rgba(255,255,255,.1);border-radius:999px;font-size:.7rem;font-weight:800}
    .portal-panel{display:none;animation:fadeUp .3s ease}
    .portal-panel.visible{display:block}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .portal-banner{border-radius:var(--radius);padding:1.4rem 1.5rem;margin-bottom:1.25rem;border:1px solid var(--glass-border);position:relative;overflow:hidden}
    .portal-banner::before{content:attr(data-icon);position:absolute;right:1.5rem;top:50%;transform:translateY(-50%);font-size:5rem;opacity:.07;pointer-events:none}
    .portal-banner.blue{background:linear-gradient(135deg,rgba(135,206,235,.1),transparent);border-color:rgba(135,206,235,.2)}
    .portal-banner.red{background:linear-gradient(135deg,rgba(255,127,110,.1),transparent);border-color:rgba(255,127,110,.2)}
    .portal-banner.green{background:linear-gradient(135deg,rgba(109,232,200,.1),transparent);border-color:rgba(109,232,200,.2)}
    .portal-banner.gold{background:linear-gradient(135deg,rgba(245,200,66,.1),transparent);border-color:rgba(245,200,66,.2)}
    .portal-banner.violet{background:linear-gradient(135deg,rgba(167,139,250,.1),transparent);border-color:rgba(167,139,250,.2)}
    .portal-banner h3{font-family:var(--font-display);font-size:clamp(1.1rem,2vw,1.5rem);font-weight:800;margin-bottom:.4rem}
    .portal-banner p{color:var(--muted);font-size:.88rem;margin:0;max-width:580px}
    .service-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem}
    .svc-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius-sm);padding:1rem 1.1rem;transition:transform .15s,border-color .2s,background .2s}
    .svc-card:hover{transform:translateY(-3px);background:var(--glass-hover)}
    .svc-card.hover-sky:hover{border-color:rgba(135,206,235,.28)}
    .svc-card.hover-coral:hover{border-color:rgba(255,127,110,.28)}
    .svc-card.hover-mint:hover{border-color:rgba(109,232,200,.28)}
    .svc-card.hover-gold:hover{border-color:rgba(245,200,66,.28)}
    .svc-card.hover-violet:hover{border-color:rgba(167,139,250,.28)}
    .svc-title{font-family:var(--font-display);font-size:.9rem;font-weight:700;margin-bottom:.35rem;display:flex;align-items:flex-start;gap:.5rem}
    .svc-icon{font-size:1.1rem;flex-shrink:0}
    .svc-meta{font-size:.77rem;color:var(--muted);line-height:1.5}
    .svc-badge{display:inline-block;font-size:.65rem;font-family:var(--font-display);font-weight:800;padding:.1rem .45rem;border-radius:999px;margin-top:.4rem;text-transform:uppercase;letter-spacing:.08em}
    .badge-sky{background:rgba(135,206,235,.15);color:var(--sky)}
    .badge-mint{background:rgba(109,232,200,.15);color:var(--mint)}
    .badge-gold{background:rgba(245,200,66,.15);color:var(--gold)}
    .badge-violet{background:rgba(167,139,250,.15);color:var(--violet)}
    .badge-hot{background:linear-gradient(90deg,var(--coral),var(--orange));color:#fff}
    /* TIERS */
    .tiers-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.8rem;margin-top:1rem}
    .tier-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);padding:1.25rem 1rem;text-align:center;transition:transform .15s,box-shadow .2s}

// ════ ROUTER ════
const app = document.getElementById('app');

function navigate() {
  const hash = location.hash || '#/home';
  const path = hash.slice(1);
  if (path.startsWith('/project/')) { renderProject({id:path.split('/')[2]}); setActive(null); return; }
  const views = {'/home':renderHome,'/about':renderAbout,'/services':renderServices,'/portals':renderPortals,'/projects':renderProjects,'/project':renderProject,'/build-your-website':renderBuildWebsite,'/contact':renderContact};
  (views[path]||renderHome)();
  setActive(path);
  window.scrollTo(0,0);
  app.focus();
}

function setActive(raw) {
  document.querySelectorAll('.nav-menu a[data-link]').forEach(a => {
    a.setAttribute('aria-current', a.getAttribute('href') === `#${raw}` ? 'page' : 'false');
  });
}

window.addEventListener('hashchange', navigate);
window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('year').textContent = new Date().getFullYear();
  navigate();
});

// ════ VIEWS ════
function renderHome() { app.innerHTML = document.getElementById('tpl-home').innerHTML; }
function renderAbout() { app.innerHTML = document.getElementById('tpl-about').innerHTML; }
function renderBuildWebsite() { app.innerHTML = document.getElementById('tpl-build-website').innerHTML; }
function renderPortals() { app.innerHTML = document.getElementById('tpl-portals').innerHTML; }

function renderContact() {
  app.innerHTML = document.getElementById('tpl-contact').innerHTML;
  const submit = document.getElementById('cf-submit');
  const errEl = document.getElementById('cf-error');
  const formWrap = document.getElementById('contactFormWrap');
  const success = document.getElementById('contactSuccess');
  if (!submit) return;
  submit.addEventListener('click', () => {
    const name = document.getElementById('cf-name').value.trim();
    const email = document.getElementById('cf-email').value.trim();
    const service = document.getElementById('cf-service').value;
    const msg = document.getElementById('cf-message').value.trim();
    if (!name || !email || !service || !msg) {
      errEl.textContent = 'Please fill in all required fields before submitting.';
      errEl.style.display = 'block'; return;
    }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      errEl.textContent = 'Please enter a valid email address.';
      errEl.style.display = 'block'; return;
    }
    errEl.style.display = 'none';
    formWrap.style.display = 'none';
    success.style.display = 'block';
  });
}

function renderProjects() {
  app.innerHTML = document.getElementById('tpl-projects').innerHTML;
  const el = document.getElementById('proj-tiles');
  const ids = ['findleads',...PROJECT_ONLY_IDS.filter(id => id !== 'findleads')];
  el.innerHTML = ids.map(id => PROJECTS[id]).filter(Boolean).map(p => `
    <article class="tile" data-nav="#/project/${escH(p.id)}" title="View ${escH(p.title)}">
      <div class="thumb" style="background-image:url('${p.logo}');background-size:contain;background-repeat:no-repeat;background-color:#0a1828"></div>
      <div class="tbody"><h3>${escH(p.title)}</h3><p>${escH(p.desc)}</p></div>
    </article>`).join('');
  el.querySelectorAll('.tile').forEach(t => t.addEventListener('click', () => location.hash = t.dataset.nav));
}

  if (titleEl) titleEl.textContent = p.title;
  const descEl = document.getElementById('projDesc');
  if (descEl) descEl.textContent = p.desc;
  const tagsEl = document.getElementById('projTags');
  if (tagsEl) tagsEl.innerHTML = (p.tags||[]).map(t => `<span class="tag">${escH(t)}</span>`).join('');
  const linksEl = document.getElementById('projLinks');
  if (linksEl) linksEl.innerHTML = (p.links||[]).map(l => `<a class="btn sky" href="${escH(l.href)}">${escH(l.label)} →</a>`).join('');
  const bodyEl = document.getElementById('projBody');
  if (bodyEl) bodyEl.innerHTML = p.body || '';
}

function renderServices() {
  app.innerHTML = document.getElementById('tpl-services').innerHTML;
  const tabsEl = document.getElementById('portalTabs');
  const panelsEl = document.getElementById('portalPanels');
  let activePortal = PORTALS_DATA[0].id;

  tabsEl.innerHTML = PORTALS_DATA.map((p,i) => `
    <button class="portal-tab${i===0?' active':''}" data-portal="${p.id}" aria-pressed="${i===0}">
      <span>${p.icon}</span> ${p.label} <span class="tab-count">${p.services.length}</span>
    </button>`).join('');

  panelsEl.innerHTML = PORTALS_DATA.map((p,i) => `
    <div class="portal-panel${i===0?' visible':''}" id="panel-${p.id}">
      <div class="portal-banner ${p.bannerClass}" data-icon="${p.icon}">
        <h3>${p.icon} ${p.label}</h3><p>${p.desc}</p>
      </div>
      <div class="service-grid">
        ${p.services.map(s => `
          <div class="svc-card ${p.hoverClass}">
            <div class="svc-title"><span class="svc-icon">${s.icon}</span>${escH(s.title)}</div>
            <div class="svc-meta">${escH(s.meta)}</div>
            ${s.badge ? `<span class="svc-badge ${s.badgeClass||p.badgeClass}">${s.badge}</span>` : ''}
          </div>`).join('')}
      </div>
    </div>`).join('');

  tabsEl.addEventListener('click', e => {
    const btn = e.target.closest('.portal-tab');
    if (!btn) return;
    const id = btn.dataset.portal;
    if (id === activePortal) return;
    activePortal = id;
    tabsEl.querySelectorAll('.portal-tab').forEach(t => { t.classList.remove('active'); t.setAttribute('aria-pressed','false'); });
    btn.classList.add('active'); btn.setAttribute('aria-pressed','true');
    panelsEl.querySelectorAll('.portal-panel').forEach(p => p.classList.remove('visible'));
    const panel = document.getElementById('panel-'+id);
    if (panel) panel.classList.add('visible');
  });

  const searchInput = document.getElementById('svcSearch');
  const searchResults = document.getElementById('searchResults');
  searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim().toLowerCase();
    if (!q) { searchResults.style.display='none'; tabsEl.style.display=''; panelsEl.style.display=''; return; }
    tabsEl.style.display='none'; panelsEl.style.display='none'; searchResults.style.display='';
    const matches = [];
    PORTALS_DATA.forEach(portal => portal.services.forEach(svc => {
      if (svc.title.toLowerCase().includes(q) || svc.meta.toLowerCase().includes(q)) matches.push({portal,svc});
    }));
    if (!matches.length) {
      searchResults.innerHTML = `<div class="card" style="text-align:center;padding:2rem"><p style="color:var(--muted)">No services found for "<strong>${escH(q)}</strong>"</p><a class="btn sky" href="#/contact">Request a Custom Service →</a></div>`;
    } else {
      searchResults.innerHTML = `<p style="color:var(--muted);font-size:.84rem;margin-bottom:.85rem">${matches.length} service${matches.length!==1?'s':''} matching "<strong style="color:var(--txt)">${escH(q)}</strong>"</p><div class="service-grid">${matches.map(({portal,svc}) => `<div class="svc-card ${portal.hoverClass}"><div style="font-size:.68rem;color:var(--muted);font-family:var(--font-display);font-weight:700;margin-bottom:.3rem;text-transform:uppercase;letter-spacing:.08em">${portal.icon} ${portal.label}</div><div class="svc-title"><span class="svc-icon">${svc.icon}</span>${escH(svc.title)}</div><div class="svc-meta">${escH(svc.meta)}</div></div>`).join('')}</div>`;
    }
  });
}

function escH(s='') { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// Konami
(function(){
  const seq=['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];
  const buf=[];
  window.addEventListener('keydown',e=>{
    buf.push(e.key); buf.splice(-seq.length-1,buf.length-seq.length);
    if(seq.every((k,i)=>buf[i]?.toLowerCase()===k.toLowerCase())){
      document.body.style.transition='filter .4s';
      document.body.style.filter='hue-rotate(180deg) saturate(150%)';
      setTimeout(()=>{document.body.style.filter='';},2000);
    }
  });
})();
</script>
